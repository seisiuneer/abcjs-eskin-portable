  <style>
    :root {

    .modal_default_content,

    .theme-builder-tab-button {

    .theme-builder-tab-button:hover,
    .theme-builder-tab-button:focus-visible {

    .theme-builder-tab-button.active {

    .theme-builder-tab-panels {

    .theme-builder-tab-panel.active {

    .theme-builder-input {
      width: 100%;
      height: 39px;
      min-height: 39px;
      margin: 0;

      color: #17241c;

      border: 1px solid #b6c5ba;

    .theme-preview-hero.graphics::before {

      left: clamp(46px, 15%, 92px);
      top: clamp(8px, 9%, 18px);
      width: clamp(60px, 16%, 96px);
      height: clamp(60px, 16%, 96px);
      border-radius: 50%;
      background: var(--theme-preview-accent, currentColor);
      opacity: .34;
      pointer-events: none;
    }

    .theme-preview-title-wrap {
      position: relative;
      z-index: 1;
      display: inline-block;
    }

      z-index: 1;
      top: 50%;
      transform: translateY(-50%);
      color: currentColor;
      font-size: clamp(48px, 11vw, 78px);
      line-height: 1;
      opacity: .55;
      pointer-events: none;
    }

    .theme-preview-header-ornament.left { left: clamp(22px, 8%, 62px); }
    .theme-preview-header-ornament.right { right: clamp(22px, 8%, 62px); }

    "line", "heroBegin", "heroEnd", "shadowColor"
  ]);

  const CUSTOM_THEME_BOOLEAN_FIELDS = new Set([
    "includeHeaderOrnaments", "includeHeaderGraphics", "includeBuiltInAdvancedCss"
  ]);

  const state = {
    customTheme: normalizeCustomTheme(DEFAULT_CUSTOM_THEME)
  };

  let sessionThemeFilename = "custom-theme.txt";
  let latestThemeBuilderTheme = state.customTheme;

  const status = document.getElementById("status");

  function isIOSDevice() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  }

  function setStatus(message, error = false) {
    status.textContent = message;
    status.hidden = !message;
    status.classList.toggle("error", error);
  }

  function optionName(options, id) {
    return (options.find(item => item.id === id) || {}).name || id;
  }

  function normalizeHexColor(color) {
    const value = String(color || "").trim();
    const match = value.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);

    if (!match) return null;

    let hex = match[1];
    if (hex.length === 3) {
      hex = hex.split("").map(ch => ch + ch).join("");
    }

    return "#" + hex.toLowerCase();
  }

  function mixHexColors(color, mixWith, amount) {
    const base = normalizeHexColor(color);
    const target = normalizeHexColor(mixWith);

    if (!base || !target) return color;

    const ratio = Math.max(0, Math.min(1, Number(amount) || 0));

    const mixed = [1, 3, 5].map(index => {
      const start = parseInt(base.slice(index, index + 2), 16);
      const end = parseInt(target.slice(index, index + 2), 16);
      return Math.round(start + (end - start) * ratio)
        .toString(16)
        .padStart(2, "0");
    });

    return "#" + mixed.join("");
  }

  function readableTextForBackground(color) {
    const hexColor = normalizeHexColor(color);

    if (!hexColor) return "#ffffff";

    const rgb = [1, 3, 5].map(index =>
      parseInt(hexColor.slice(index, index + 2), 16) / 255
    );

    const linear = rgb.map(channel =>
      channel <= 0.03928
        ? channel / 12.92
        : Math.pow((channel + 0.055) / 1.055, 2.4)
    );

    const luminance =
      0.2126 * linear[0] +
      0.7152 * linear[1] +
      0.0722 * linear[2];

    const contrastWithWhite = 1.05 / (luminance + 0.05);
    const contrastWithBlack = (luminance + 0.05) / 0.05;

    return contrastWithBlack > contrastWithWhite ? "#000000" : "#ffffff";
  }


  function hexToRgba(color, alpha) {
    const hex = normalizeHexColor(color);
    if (!hex) return color;
    const rgb = [1, 3, 5].map(index => parseInt(hex.slice(index, index + 2), 16));
    return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${Math.max(0, Math.min(1, Number(alpha) || 0))})`;
  }

  function extractHexColorsFromCss(value) {
    return String(value || "").match(/#[0-9a-f]{3}(?:[0-9a-f]{3})?/gi) || [];
  }

  function cssColorToHex(value) {
    const text = String(value || "").trim();
    const hex = normalizeHexColor(text);
    if (hex) return hex;

    const rgbaMatch = text.match(/^rgba?\(\s*(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})/i);
    if (!rgbaMatch) return null;

    const rgb = rgbaMatch.slice(1, 4).map(channel =>
      Math.max(0, Math.min(255, Number(channel) || 0))
        .toString(16)
        .padStart(2, "0")
    );

    return "#" + rgb.join("");
  }

  function extractCssColors(value) {
    return String(value || "").match(/#[0-9a-f]{3}(?:[0-9a-f]{3})?|rgba?\([^)]*\)|hsla?\([^)]*\)/gi) || [];
  }

  function replaceLastCssColor(value, color) {
    const hex = normalizeHexColor(color);
    if (!hex) return String(value || "");
    const css = String(value || "").trim();
    const colorPattern = /(#[0-9a-f]{3}(?:[0-9a-f]{3})?|rgba?\([^)]*\)|hsla?\([^)]*\))/gi;
    const matches = [...css.matchAll(colorPattern)];
    if (!matches.length) return `0 12px 28px ${hexToRgba(hex, .16)}`;

    const last = matches[matches.length - 1];
    const originalColor = last[0];
    const rgb = hex.match(/[0-9a-f]{2}/gi).map(component => parseInt(component, 16));
    let replacement = hex;

    const rgbaMatch = originalColor.match(/^rgba\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*([^)]*?)\s*\)$/i);
    const rgbMatch = originalColor.match(/^rgb\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*\)$/i);

    if (rgbaMatch) {
      replacement = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${rgbaMatch[1].trim()})`;
    } else if (rgbMatch) {
      replacement = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    }

    return css.slice(0, last.index) + replacement + css.slice(last.index + originalColor.length);
  }

  function updateHeroCssFieldFromGradient(modalRoot) {
    if (!modalRoot) return;
    const heroField = findThemeBuilderField(modalRoot, "hero");
    const beginField = findThemeBuilderField(modalRoot, "heroBegin");
    const endField = findThemeBuilderField(modalRoot, "heroEnd");
    if (!heroField || !beginField || !endField) return;

    const begin = normalizeHexColor(beginField.value) || DEFAULT_CUSTOM_THEME.heroBegin;
    const end = normalizeHexColor(endField.value) || DEFAULT_CUSTOM_THEME.heroEnd;
    heroField.value = `linear-gradient(135deg,${begin},${end})`;
  }

  function parseBooleanLike(value, defaultValue) {
    if (typeof value === "boolean") return value;
    if (typeof value === "number") return value !== 0;
    const text = String(value ?? "").trim().toLowerCase();
    if (["true", "1", "yes", "on"].includes(text)) return true;
    if (["false", "0", "no", "off"].includes(text)) return false;
    return !!defaultValue;
  }

  function slugify(text, fallback = "tune") {
    const value = String(text || "")
      .normalize("NFKD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .slice(0, 60);
    return value || fallback;
  }

  function extractField(abc, field) {
    const match = abc.match(new RegExp("^" + field + "\\s*:\\s*(.+)$", "mi"));
    return match ? match[1].trim() : "";
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeHtmlAllowBreaks(value) {
    const breakToken = "__ABC_WEBSITE_BUILDER_BR__";
    return escapeHtml(
      String(value ?? "").replace(/<br\s*\/?>/gi, breakToken)
    )
      .replaceAll(breakToken, "<br>")
      .replace(/\n/g, "<br>");
  }

  function isSafeUserLinkUrl(value) {
    const url = String(value || "").trim();
    if (!url) return false;

    if (/^(?:https?:|mailto:|tel:)/i.test(url)) return true;
    return /^(?:#|\/(?!\/)|\.\.?\/)/.test(url);
  }

  function escapeHtmlAllowLinksAndBreaks(value) {
    const tokens = [];
    const tokenPrefix = "\uE000ABC_LINK_";
    const tokenSuffix = "_END\uE001";

    const withLinkTokens = String(value ?? "").replace(
      /<a\b([^>]*)>([\s\S]*?)<\/a\s*>/gi,
      (match, attributes, linkText) => {
        const hrefMatch = attributes.match(
          /\bhref\s*=\s*(["'])(.*?)\1/i
        );

        if (!hrefMatch) return match;

        const href = hrefMatch[2].trim();
        if (!isSafeUserLinkUrl(href)) return match;

        const targetMatch = attributes.match(
          /\btarget\s*=\s*(["'])(.*?)\1/i
        );
        const openInNewTab =
          targetMatch && targetMatch[2].trim().toLowerCase() === "_blank";

        const token = tokenPrefix + tokens.length + tokenSuffix;
        const targetAttributes = openInNewTab
          ? ' target="_blank" rel="noopener noreferrer"'
          : "";

        tokens.push(
          `<a href="${escapeHtml(href)}"${targetAttributes}>${escapeHtmlAllowBreaks(linkText)}</a>`
        );
        return token;
      }
    );

    let result = escapeHtmlAllowBreaks(withLinkTokens);

    tokens.forEach((linkHtml, index) => {
      result = result.replaceAll(
        tokenPrefix + index + tokenSuffix,
        linkHtml
      );
    });

    return result;
  }

  function ensureTxtExtension(filename) {
    let safeName = String(filename || "").trim();
    if (!safeName) safeName = "website-settings";
    safeName = safeName.replace(/[\/:*?"<>|]+/g, "-");
    if (!/\.txt$/i.test(safeName)) {
      safeName = safeName.replace(/\.[^.\/]*$/, "") + ".txt";
    }
    return safeName;
  }

  function themeNameToFilename(themeName, fallback = "custom-theme.txt") {
    let safeName = String(themeName || "").trim();

    if (!safeName) {
      return ensureTxtExtension(fallback);
    }

    safeName = safeName
      .normalize("NFKD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/&/g, " and ")
      .replace(/[^a-z0-9]+/gi, "-")
      .replace(/^-+|-+$/g, "")
      .toLowerCase();

    if (!safeName) {
      safeName = String(themeName || "custom-theme")
        .trim()
        .replace(/[\/:*?"<>|]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    return ensureTxtExtension(safeName || fallback);
  }

  async function promptThemeFilename(themeName) {
    const defaultName = themeNameToFilename(themeName, sessionThemeFilename || "custom-theme.txt");
    const result = await DayPilot.Modal.form(
      [{ name: "Theme filename", id: "filename", type: "text" }],
      { filename: defaultName },
      { top: 150 },
      { title: "Save Custom Theme", width: 470, okText: "Save", cancelText: "Cancel" }
    );

    if (result.canceled) return null;

    const filename = ensureTxtExtension(result.result.filename || defaultName);
    sessionThemeFilename = filename;
    return filename;
  }

  function normalizeCustomTheme(rawTheme) {
    const source = rawTheme && typeof rawTheme === "object" && !Array.isArray(rawTheme)
      ? (rawTheme.theme && typeof rawTheme.theme === "object" && !Array.isArray(rawTheme.theme)
          ? rawTheme.theme
          : rawTheme)
      : {};

    const theme = { ...DEFAULT_CUSTOM_THEME };

    CUSTOM_THEME_FIELDS.forEach(field => {
      if (!Object.prototype.hasOwnProperty.call(source, field)) return;
      if (CUSTOM_THEME_BOOLEAN_FIELDS.has(field)) {
        theme[field] = parseBooleanLike(source[field], DEFAULT_CUSTOM_THEME[field]);
        return;
      }
      const value = String(source[field] ?? "").trim();
      if (value) theme[field] = value;
    });

    if (Object.prototype.hasOwnProperty.call(source, "customCss") &&
        !Object.prototype.hasOwnProperty.call(source, "advancedCss")) {
      theme.advancedCss = stripGeneratedHeaderCssFromCustomCss(source.customCss);
    }

    CUSTOM_THEME_COLOR_FIELDS.forEach(field => {
      theme[field] = normalizeHexColor(theme[field]) || DEFAULT_CUSTOM_THEME[field];
    });

    const heroColors = extractCssColors(theme.hero)
      .map(cssColorToHex)
      .filter(Boolean);

    if (!Object.prototype.hasOwnProperty.call(source, "heroBegin")) {
      theme.heroBegin = normalizeHexColor(heroColors[0]) || normalizeHexColor(theme.primary) || DEFAULT_CUSTOM_THEME.heroBegin;
    }
    if (!Object.prototype.hasOwnProperty.call(source, "heroEnd")) {
      theme.heroEnd = normalizeHexColor(heroColors[1]) || normalizeHexColor(theme.secondary) || DEFAULT_CUSTOM_THEME.heroEnd;
    }

    const shadowColors = extractCssColors(theme.shadow);
    if (!Object.prototype.hasOwnProperty.call(source, "shadowColor")) {
      theme.shadowColor = cssColorToHex(shadowColors[shadowColors.length - 1]) || DEFAULT_CUSTOM_THEME.shadowColor;
    }

    const suppliedHero = Object.prototype.hasOwnProperty.call(source, "hero")
      ? String(source.hero || "").trim()
      : "";

    theme.hero = suppliedHero || `linear-gradient(135deg,${theme.heroBegin},${theme.heroEnd})`;
    theme.shadow = replaceLastCssColor(theme.shadow, theme.shadowColor);

    if (Object.prototype.hasOwnProperty.call(source, "customCss") &&
        !Object.prototype.hasOwnProperty.call(source, "includeBuiltInAdvancedCss")) {
      theme.includeBuiltInAdvancedCss = !!String(theme.advancedCss || "").trim();
    }

    theme.includeHeaderOrnaments = parseBooleanLike(theme.includeHeaderOrnaments, true);
    theme.includeHeaderGraphics = parseBooleanLike(theme.includeHeaderGraphics, true);
    theme.includeBuiltInAdvancedCss = parseBooleanLike(theme.includeBuiltInAdvancedCss, false);
    theme.customCss = theme.includeBuiltInAdvancedCss ? String(theme.advancedCss || "") : "";

    return theme;
  }

  function validateCustomTheme(rawTheme) {
    const source = rawTheme && typeof rawTheme === "object" && !Array.isArray(rawTheme)
      ? (rawTheme.theme && typeof rawTheme.theme === "object" && !Array.isArray(rawTheme.theme)
          ? rawTheme.theme
          : rawTheme)
      : null;

    if (!source) {
      return { theme: null, errors: ["The file does not contain a custom theme object."] };
    }

    const errors = [];
    const theme = normalizeCustomTheme(source);

    CUSTOM_THEME_COLOR_FIELDS.forEach(field => {
      if (Object.prototype.hasOwnProperty.call(source, field) && !normalizeHexColor(source[field])) {
        errors.push(`${field} must be a valid hex color, such as #167047.`);
      }
    });

    ["font", "radius", "shadow", "ornament", "name"].forEach(field => {
      if (Object.prototype.hasOwnProperty.call(source, field) && !String(source[field] ?? "").trim()) {
        errors.push(`${field} cannot be blank.`);
      }
    });

    CUSTOM_THEME_BOOLEAN_FIELDS.forEach(field => {
      if (!Object.prototype.hasOwnProperty.call(source, field)) return;
      const value = source[field];
      if (typeof value === "boolean") return;
      if (typeof value === "number" && (value === 0 || value === 1)) return;
      const text = String(value ?? "").trim().toLowerCase();
      if (!["true", "1", "yes", "on", "false", "0", "no", "off"].includes(text)) {
        errors.push(`${field} must be true or false.`);
      }
    });

    return { theme: errors.length ? null : theme, errors };
  }

  function jsSingleQuotedString(value) {
    return "'" + String(value ?? "")
      .replace(/\\/g, "\\\\")
      .replace(/'/g, "\\'")
      .replace(/\r/g, "\\r")
      .replace(/\n/g, "\\n") + "'";
  }

  function jsTemplateLiteralString(value) {
    return "`" + String(value ?? "")
      .replace(/\\/g, "\\\\")
      .replace(/`/g, "\\`")
      .replace(/\$\{/g, "\\${") + "`";
  }

  function cssContentString(value) {
    return '"' + String(value ?? "")
      .replace(/\\/g, "\\\\")
      .replace(/"/g, '\\"')
      .replace(/\r/g, " ")
      .replace(/\n/g, " ") + '"';
  }

  const THEME_BUILDER_HEADER_CSS_BEGIN = "/* Theme Builder generated header decoration CSS: begin */";
  const THEME_BUILDER_HEADER_CSS_END = "/* Theme Builder generated header decoration CSS: end */";

  function stripGeneratedHeaderCssFromCustomCss(css) {
    return String(css || "")
      .replace(new RegExp(
        THEME_BUILDER_HEADER_CSS_BEGIN.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") +
        "[\\s\\S]*?" +
        THEME_BUILDER_HEADER_CSS_END.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"),
        "g"
      ), "")
      .trim();
  }

  function generatedBuiltInHeaderCssForTheme(theme) {
    const t = normalizeCustomTheme(theme);
    const rules = [];

    if (t.includeHeaderGraphics) {
      rules.push(`
    .hero {
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at clamp(136px,21.6vw,388px) clamp(56px,5.5vw,86px), color-mix(in srgb,var(--accent) 34%,transparent) 0 clamp(46px,2.8vw,58px), transparent clamp(47px,2.9vw,60px)),
        ${t.hero || DEFAULT_CUSTOM_THEME.hero};
    }`);
    }

    if (t.includeHeaderOrnaments) {
      rules.push(`
    .hero {
      position:relative;
      overflow:hidden;
    }
    .hero .page-width {
      position:relative;
      z-index:2;
    }
    .hero h1 {
      position:relative;
      z-index:2;
    }
    .hero h1::before,
    .hero h1::after {
      position:absolute;
      z-index:-1;
      top:calc(50% + clamp(16px,1.5vw,24px));
      transform:translateY(-50%);
      content:${cssContentString(t.ornament || "•")};
      color:var(--accent);
      font-size:clamp(62px,5.2vw,94px);
      line-height:1;
      opacity:.55;
      pointer-events:none;
    }
    .hero h1::before {
      left:calc((100% - 100vw) / 2 + clamp(34px,8.5vw,190px));
    }
    .hero h1::after {
      right:calc((100% - 100vw) / 2 + clamp(34px,8.5vw,190px));
    }
    @media (max-width:720px) {
      .hero h1::before,
      .hero h1::after {
        display:none;
      }
    }`);
    }

    const css = rules.join("\n").trim();
    return css
      ? [THEME_BUILDER_HEADER_CSS_BEGIN, css, THEME_BUILDER_HEADER_CSS_END].join("\n")
      : "";
  }

  function formatCustomThemeAsBuiltInThemeSource(theme) {
    const t = normalizeCustomTheme(theme);
    const scalarFields = [
      "name", "font", "bg", "panel", "ink", "muted", "primary", "secondary",
      "accent", "line", "hero", "radius", "shadow", "ornament"
    ];
    const booleanFields = [
      "includeHeaderOrnaments", "includeHeaderGraphics", "includeBuiltInAdvancedCss"
    ];

    const advancedCss = t.includeBuiltInAdvancedCss
      ? String(t.advancedCss || "").trim()
      : "";
    const generatedHeaderCss = generatedBuiltInHeaderCssForTheme(t);
    const customCss = [generatedHeaderCss, advancedCss]
      .map(value => String(value || "").trim())
      .filter(Boolean)
      .join("\n\n");

    const lines = ["{"];
    const entries = [];

    scalarFields.forEach(field => {
      entries.push(`  ${field}: ${jsSingleQuotedString(t[field])}`);
    });

    booleanFields.forEach(field => {
      entries.push(`  ${field}: ${t[field] ? "true" : "false"}`);
    });

    if (advancedCss) {
      entries.push("  advancedCss: " + jsTemplateLiteralString(advancedCss));
    }

    if (customCss) {
      entries.push("  customCss: " + jsTemplateLiteralString(customCss));
    }

    entries.forEach((entry, index) => {
      lines.push(entry + (index === entries.length - 1 ? "" : ","));
    });

    lines.push("}");
    return lines.join("\n");
  }

  function parseCustomThemeText(text) {
    const sourceText = String(text || "").trim();
    if (!sourceText) {
      throw new Error("The selected custom theme file is empty.");
    }

    const candidates = [sourceText];
    const firstBrace = sourceText.indexOf("{");
    const lastBrace = sourceText.lastIndexOf("}");
    if (firstBrace >= 0 && lastBrace > firstBrace) {
      candidates.push(sourceText.slice(firstBrace, lastBrace + 1));
    }

    let lastError = null;

    for (const candidate of candidates) {
      try {
        // The Theme Builder is a developer-only helper and the file is selected
        // locally by the user. This allows loading the same object-literal text
        // that can be pasted into the built-in theme table.
        return Function('"use strict"; return (' + candidate.replace(/,\s*$/, "") + ');')();
      } catch (error) {
        lastError = error;
      }
    }

    throw lastError || new Error("The selected custom theme file is not a valid built-in theme object literal.");
  }

  function downloadThemeFile(filename, theme) {
    const text = formatCustomThemeAsBuiltInThemeSource(theme);
    const blob = new Blob([text + "\n"], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement("a");
    anchor.href = url;
    anchor.download = filename;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function getOpenThemeBuilderModalRoot() {
    return document.getElementById("theme-builder-root");
  }

  function findThemeBuilderField(modalRoot, fieldId) {
    if (!modalRoot) return null;

    return modalRoot.querySelector('[data-theme-field="' + fieldId + '"]') ||
      modalRoot.querySelector(
        'input[name="' + fieldId + '"], ' +
        'select[name="' + fieldId + '"], ' +
        'textarea[name="' + fieldId + '"], ' +
        'input[id="' + fieldId + '"], ' +
        'select[id="' + fieldId + '"], ' +
        'textarea[id="' + fieldId + '"]'
      );
  }

  function getCurrentThemeFromOpenThemeBuilderDialog() {
    const modalRoot = getOpenThemeBuilderModalRoot();
    const current = normalizeCustomTheme(state.customTheme || DEFAULT_CUSTOM_THEME);

    if (!modalRoot) return current;

    CUSTOM_THEME_FIELDS.forEach(fieldId => {
      const field = findThemeBuilderField(modalRoot, fieldId);
      if (!field) return;
      current[fieldId] = field.type === "checkbox"
        ? !!field.checked
        : String(field.value || "").trim();
    });

    return current;
  }

  function applyThemeValuesInOpenThemeBuilderDialog(theme) {
    const modalRoot = getOpenThemeBuilderModalRoot();
    if (!modalRoot) return false;

    const normalized = normalizeCustomTheme(theme);
    CUSTOM_THEME_FIELDS.forEach(fieldId => {
      const field = findThemeBuilderField(modalRoot, fieldId);
      if (!field) return;
      if (field.type === "checkbox") {
        field.checked = !!normalized[fieldId];
      } else {
        const value = String(normalized[fieldId] || "");
        if (field.tagName === "SELECT" && !Array.from(field.options).some(option => option.value === value)) {
          field.insertBefore(new Option("Loaded theme font", value), field.firstChild);
        }
        field.value = value;
      }
      field.dispatchEvent(new Event("input", { bubbles: true }));
      field.dispatchEvent(new Event("change", { bubbles: true }));
    });

    latestThemeBuilderTheme = normalized;
    syncThemeBuilderColorPickers(true);
    updateThemeBuilderPreview();

    return true;
  }

  async function saveCustomThemeFromBuilder() {
    const currentTheme = getCurrentThemeFromOpenThemeBuilderDialog();
    const validation = validateCustomTheme(currentTheme);

    if (!validation.theme) {
      await DayPilot.Modal.alert(
        "The current custom theme could not be saved because it contains invalid values:<br><br>" +
        escapeHtml(validation.errors.join("\n")).replace(/\n/g, "<br>"),
        { title: "Invalid Custom Theme", okText: "OK", top: 150 }
      );
      return;
    }

    const filename = await promptThemeFilename(validation.theme.name);
    if (!filename) return;

    downloadThemeFile(filename, validation.theme);
    setStatus(`Saved custom theme to ${filename}.`);
  }

  async function loadCustomThemeIntoBuilder() {
    const file = await selectSettingsFile();
    if (!file) return;

    try {
      const text = await file.text();
      const parsed = parseCustomThemeText(text);
      const validation = validateCustomTheme(parsed);

      if (!validation.theme) {
        throw new Error(validation.errors.join("\n"));
      }

      applyThemeValuesInOpenThemeBuilderDialog(validation.theme);
      setStatus(`Loaded custom theme from ${file.name}. Edit the loaded values or save a theme file when ready.`);
    } catch (error) {
      console.warn("Unable to load custom theme file.", error);
      await DayPilot.Modal.alert(
        "The selected custom theme file could not be loaded.<br><br>" +
        escapeHtml(error.message || String(error)).replace(/\n/g, "<br>"),
        { title: "Invalid Custom Theme File", okText: "OK", top: 150 }
      );
      setStatus("The selected custom theme file could not be loaded.", true);
    }
  }

  function themeBuilderFieldRow(modalRoot, fieldId) {

  function addImportantToPreviewCss(css) {
    return String(css || "").replace(/:([^;{}]+);/g, (match, value) => {
      return /!important/i.test(value) ? match : `:${value} !important;`;
    });
  }

  function customCssForThemeBuilderPreview(css) {
    let text = String(css || "").trim();
    if (!text) return "";

    const replacements = [
      [/\bbody\b/g, "#theme-builder-preview-area"],
      [/\.hero\s+\.page-width/g, "#theme-preview-hero"],
      [/\.hero\s+h1/g, "#theme-preview-title"],
      [/\.hero-copy/g, "#theme-preview-subtitle"],
      [/\.hero/g, "#theme-preview-hero"],
      [/\.table-of-contents::before/g, "#theme-preview-panel::before"],
      [/\.score-panel::before/g, "#theme-preview-panel::before"],
      [/\.table-of-contents/g, "#theme-preview-panel"],
      [/\.score-panel/g, "#theme-preview-panel"],
      [/\.paper/g, "#theme-preview-panel"],
      [/\.tune-header\s+h2/g, "#theme-preview-heading"],
      [/\.toc-links\s+a/g, "#theme-preview-button, #theme-preview-toc-link-one, #theme-preview-toc-link-two"],
      [/\.back-to-toc/g, "#theme-preview-button"],
      [/\.section-divider\s+span/g, "#theme-preview-ornament"],
      [/\.section-divider/g, "#theme-preview-ornament"],
      [/\.site-footer/g, "#theme-preview-ornament"],
      [/\.chapter-label/g, "#theme-preview-ornament"],
      [/\.toc-links\s+span/g, "#theme-preview-toc-badge-one, #theme-preview-toc-badge-two"]
    ];

    replacements.forEach(([pattern, replacement]) => {
      text = text.replace(pattern, replacement);
    });

    // Theme Builder previews must stay inside the preview card. Some built-in
    // theme CSS uses fixed body pseudo-elements for full-page animated
    // backgrounds; when mapped to the preview, convert those fixed layers to
    // absolute layers so they are clipped by the preview frame and disappear
    // cleanly when another theme is selected.
    text = text.replace(/\bposition\s*:\s*fixed\s*;/gi, "position: absolute;");

    return addImportantToPreviewCss(text);
  }

  function updateThemeBuilderPreviewCustomCss(theme) {
    const styleId = "theme-builder-preview-custom-css";
    let style = document.getElementById(styleId);
    const css = theme && theme.includeBuiltInAdvancedCss
      ? customCssForThemeBuilderPreview(theme.advancedCss || theme.customCss || "")
      : "";

    if (!css) {
      if (style) style.remove();
      return;
    }

    if (!style) {
      style = document.createElement("style");
      style.id = styleId;
      document.head.appendChild(style);
    }

    style.textContent = css;
  }

  function setThemeBuilderPreviewStyle(element, property, value) {
    if (!element) return;
    element.style.setProperty(property, String(value || ""), "important");

  function updateThemeBuilderPreview() {
    const root = document.getElementById("theme-builder-root");
    if (!root) return;

    const theme = normalizeCustomTheme(getCurrentThemeFromOpenThemeBuilderDialog());
    const preview = document.getElementById("theme-builder-preview-area");
    const hero = document.getElementById("theme-preview-hero");
    const body = document.getElementById("theme-preview-body");
    const tocPanel = document.getElementById("theme-preview-toc");

    const headerOrnaments = Array.from(document.querySelectorAll(".theme-preview-header-ornament"));

    if (!preview || !hero || !body || !tocPanel || !panel) return;

    // Apply the optional mapped custom CSS first. The normal editable theme
    // controls are then applied as inline !important styles so color/font/
    // shadow edits still update the preview even when the preserved built-in
    // CSS contains !important preview rules.
    updateThemeBuilderPreviewCustomCss(theme);

    const heroText = readableTextForBackground(theme.primary || DEFAULT_CUSTOM_THEME.primary);
    const buttonText = readableTextForBackground(theme.primary || DEFAULT_CUSTOM_THEME.primary);

    setThemeBuilderPreviewStyle(preview, "font-family", theme.font);
    setThemeBuilderPreviewStyle(preview, "background", theme.bg);
    setThemeBuilderPreviewStyle(preview, "color", theme.ink);
    setThemeBuilderPreviewStyle(hero, "background", theme.hero);
    setThemeBuilderPreviewStyle(hero, "color", heroText);
    hero.style.setProperty("--theme-preview-accent", theme.accent, "important");
    hero.classList.toggle("graphics", !!theme.includeHeaderGraphics);
    setThemeBuilderPreviewStyle(body, "background", theme.bg);
    setThemeBuilderPreviewStyle(tocPanel, "background", theme.panel);
    setThemeBuilderPreviewStyle(tocPanel, "color", theme.ink);
    setThemeBuilderPreviewStyle(tocPanel, "border-color", theme.line);
    setThemeBuilderPreviewStyle(tocPanel, "border-radius", theme.radius);
    setThemeBuilderPreviewStyle(tocPanel, "box-shadow", theme.shadow);
    setThemeBuilderPreviewStyle(panel, "background", theme.panel);
    setThemeBuilderPreviewStyle(panel, "color", theme.ink);
    setThemeBuilderPreviewStyle(panel, "border-color", theme.line);
    setThemeBuilderPreviewStyle(panel, "border-radius", theme.radius);
    setThemeBuilderPreviewStyle(panel, "box-shadow", theme.shadow);

    if (title) title.textContent = theme.name || "Custom Theme";
    if (subtitle) setThemeBuilderPreviewStyle(subtitle, "color", heroText);
    if (tocHeading) setThemeBuilderPreviewStyle(tocHeading, "color", theme.primary);
    tocLinks.forEach(item => {
      setThemeBuilderPreviewStyle(item, "background", theme.panel);
      setThemeBuilderPreviewStyle(item, "color", theme.ink);
      setThemeBuilderPreviewStyle(item, "border-color", theme.line);
      setThemeBuilderPreviewStyle(item, "border-radius", theme.radius);
    });
    tocBadges.forEach(item => {
      setThemeBuilderPreviewStyle(item, "background", theme.primary);
      setThemeBuilderPreviewStyle(item, "color", readableTextForBackground(theme.primary || DEFAULT_CUSTOM_THEME.primary));
      setThemeBuilderPreviewStyle(item, "border", "2px solid " + theme.secondary);
    });
    if (heading) setThemeBuilderPreviewStyle(heading, "color", theme.primary);
    if (text) setThemeBuilderPreviewStyle(text, "color", theme.muted);
    if (button) {
      setThemeBuilderPreviewStyle(button, "background", theme.primary);
      setThemeBuilderPreviewStyle(button, "color", buttonText);
      setThemeBuilderPreviewStyle(button, "border", "2px solid " + theme.accent);
    }
    headerOrnaments.forEach(item => {
      item.textContent = theme.ornament || "•";
      setThemeBuilderPreviewStyle(item, "color", theme.accent);
      setThemeBuilderPreviewStyle(item, "display", theme.includeHeaderOrnaments ? "block" : "none");
    });
    if (ornament) {
      ornament.textContent = theme.ornament || "•";
      setThemeBuilderPreviewStyle(ornament, "color", theme.secondary);
    }

    updateThemeBuilderPayloadField();

  function syncThemeBuilderColorPickers(forceRefresh = false) {
    const modalRoot = getOpenThemeBuilderModalRoot();
    if (!modalRoot) return;

    CUSTOM_THEME_COLOR_PICKER_FIELDS.forEach(fieldId => {
      const textField = findThemeBuilderField(modalRoot, fieldId);
      if (!textField) return;

      const picker = modalRoot.querySelector('[data-theme-color-picker="' + fieldId + '"]');
      if (!picker) return;

      picker.value = normalizeHexColor(textField.value) || DEFAULT_CUSTOM_THEME[fieldId] || "#000000";

      if (!forceRefresh && textField.dataset.colorPickerReady === "true") return;

      if (textField.dataset.colorPickerReady === "true") return;

      picker.addEventListener("input", () => {
        textField.value = picker.value;
        if (fieldId === "heroBegin" || fieldId === "heroEnd") {
          updateHeroCssFieldFromGradient(modalRoot);
        }
        textField.dispatchEvent(new Event("input", { bubbles: true }));
        textField.dispatchEvent(new Event("change", { bubbles: true }));
        updateThemeBuilderPreview();
      });

      textField.addEventListener("input", () => {
        const hex = normalizeHexColor(textField.value);
        if (hex) picker.value = hex;
        updateThemeBuilderPreview();
      });

      textField.addEventListener("change", () => {
        const hex = normalizeHexColor(textField.value);
        if (hex) {
          textField.value = hex;
          picker.value = hex;
        }
        if (fieldId === "heroBegin" || fieldId === "heroEnd") {
          updateHeroCssFieldFromGradient(modalRoot);

        updateThemeBuilderPreview();

  function initializeThemeBuilderLayout() {
    const root = document.getElementById("theme-builder-root");
    const modalRoot = getOpenThemeBuilderModalRoot();
    if (!root || !modalRoot) return false;

    initializeThemeBuilderTabs();

    CUSTOM_THEME_FIELDS.forEach(fieldId => {
      const field = findThemeBuilderField(modalRoot, fieldId);
      if (!field || field.dataset.previewReady === "true") return;
      field.addEventListener("input", updateThemeBuilderPreview);
      field.addEventListener("change", updateThemeBuilderPreview);

  function rgbComponentToHex(value) {
    return Math.max(0, Math.min(255, Number(value) || 0))
      .toString(16)
      .padStart(2, "0");
  }

  function rgbToHtmlHex(red, green, blue) {
    return "#" +
      rgbComponentToHex(red) +
      rgbComponentToHex(green) +
      rgbComponentToHex(blue);
  }

  async function copyTextToClipboard(text) {
    const value = String(text || "");

    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(value);
      return true;
    }

    const textarea = document.createElement("textarea");
    textarea.value = value;
    textarea.setAttribute("readonly", "readonly");
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    let copied = false;
    try {
      copied = document.execCommand("copy");
    } finally {
      textarea.remove();
    }

    return copied;
  }

  function setThemeBuilderColorSamplerStatus(message, error = false) {
    const statusElement = document.getElementById("theme-builder-color-sampler-status");
    if (!statusElement) return;
    statusElement.textContent = message;
    statusElement.style.color = error ? "#9d1c1c" : "#675454";

  function setThemeBuilderSampledColor(hex) {
    const valueElement = document.getElementById("theme-builder-color-sampler-value");
    const swatch = document.getElementById("theme-builder-color-sampler-swatch");
    if (valueElement) valueElement.textContent = hex;
    if (swatch) swatch.style.backgroundColor = hex;

  function initializeThemeBuilderColorSampler() {
    const action = document.getElementById("theme-builder-color-sampler-action");
    const fileInput = document.getElementById("theme-builder-color-sampler-file");
    const panel = document.getElementById("theme-builder-color-sampler-panel");
    const canvas = document.getElementById("theme-builder-color-sampler-canvas");
    const hideAction = document.getElementById("theme-builder-color-sampler-hide-action");

    if (!action || !fileInput || !panel || !canvas || !hideAction) return;
    if (action.dataset.initialized === "true") return;

    const context = canvas.getContext("2d", { willReadFrequently: true });

    action.addEventListener("click", () => {
      fileInput.value = "";
      fileInput.click();
    });

    hideAction.addEventListener("click", () => {
      panel.hidden = true;
      fileInput.value = "";
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      if (!/^image\/(png|jpeg)$/i.test(file.type) && !/\.(png|jpe?g)$/i.test(file.name || "")) {
        setThemeBuilderColorSamplerStatus("Please choose a PNG or JPEG image.", true);
        panel.hidden = false;
        return;
      }

      const reader = new FileReader();

      reader.addEventListener("load", () => {
        const image = new Image();

        image.addEventListener("load", () => {
          const width = Math.max(1, image.naturalWidth || image.width || 1);
          const height = Math.max(1, image.naturalHeight || image.height || 1);

          canvas.width = width;
          canvas.height = height;
          canvas.style.width = width + "px";
          canvas.style.height = height + "px";
          context.clearRect(0, 0, width, height);
          context.drawImage(image, 0, 0);
          panel.hidden = false;
          setThemeBuilderColorSamplerStatus("Click the image to copy a color.");
        });

        image.addEventListener("error", () => {
          panel.hidden = false;
          setThemeBuilderColorSamplerStatus("The selected image could not be loaded.", true);
        });

        image.src = String(reader.result || "");
      });

      reader.addEventListener("error", () => {
        panel.hidden = false;
        setThemeBuilderColorSamplerStatus("The selected image could not be read.", true);
      });

      reader.readAsDataURL(file);
    });

    canvas.addEventListener("click", async event => {
      if (!canvas.width || !canvas.height) return;

      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const x = Math.max(0, Math.min(canvas.width - 1, Math.floor((event.clientX - rect.left) * canvas.width / rect.width)));
      const y = Math.max(0, Math.min(canvas.height - 1, Math.floor((event.clientY - rect.top) * canvas.height / rect.height)));
      const pixel = context.getImageData(x, y, 1, 1).data;
      const hex = rgbToHtmlHex(pixel[0], pixel[1], pixel[2]);

      setThemeBuilderSampledColor(hex);

      try {
        const copied = await copyTextToClipboard(hex);
        setThemeBuilderColorSamplerStatus(copied ? `Copied ${hex} to the clipboard.` : `Selected ${hex}. Copy it manually if needed.`, !copied);
      } catch (error) {
        console.warn("Unable to copy sampled image color.", error);
        setThemeBuilderColorSamplerStatus(`Selected ${hex}. Clipboard copy was blocked; copy it manually.`, true);
      }
    });

    action.dataset.initialized = "true";
  }

  function initializeThemeBuilderActions() {
    const saveButton = document.getElementById("theme-builder-save-action");
    if (saveButton && saveButton.dataset.initialized !== "true") {
      saveButton.addEventListener("click", saveCustomThemeFromBuilder);
      saveButton.dataset.initialized = "true";
    }

    const loadButton = document.getElementById("theme-builder-load-action");
    if (loadButton && loadButton.dataset.initialized !== "true") {
      loadButton.addEventListener("click", loadCustomThemeIntoBuilder);
      loadButton.dataset.initialized = "true";
    }

    const loadBuiltInButton = document.getElementById("theme-builder-load-built-in-action");
    if (loadBuiltInButton && loadBuiltInButton.dataset.initialized !== "true") {
      loadBuiltInButton.addEventListener("click", loadBuiltInThemeIntoBuilder);
      loadBuiltInButton.dataset.initialized = "true";
    }

    initializeThemeBuilderColorSampler();
  }

  function scheduleThemeBuilderActions() {
    let attempts = 0;

    const apply = () => {
      attempts += 1;
      initializeThemeBuilderActions();
      const layoutReady = initializeThemeBuilderLayout();

      const ready = document.getElementById("theme-builder-save-action") &&
        document.getElementById("theme-builder-load-action") &&
        document.getElementById("theme-builder-load-built-in-action") &&
        document.getElementById("theme-builder-color-sampler-action") && layoutReady;

      if (!ready && attempts < 40) {
        setTimeout(apply, 25);
      }
    };

    requestAnimationFrame(() => requestAnimationFrame(apply));
  }

    if (!themeId || themeId === "custom") return;

    const themeName = optionName(THEME_OPTIONS, themeId);

  function selectSettingsFile() {
    return new Promise(resolve => {
      const input = document.createElement("input");
      input.type = "file";
      input.multiple = false;

      if (!isIOSDevice()) {
        input.setAttribute("accept", ".txt,.json,text/plain,application/json");
      }

      input.addEventListener("change", () => {
        resolve(input.files && input.files.length ? input.files[0] : null);
        input.remove();
      }, { once: true });

      document.body.appendChild(input);
      input.click();
    });
  }
