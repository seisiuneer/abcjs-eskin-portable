  };

    "line", "heroBegin", "heroEnd", "shadowColor"

  const CUSTOM_THEME_COLOR_PICKER_FIELDS = new Set([
    "bg", "panel", "ink", "muted", "primary", "secondary", "accent",

  ]);

  ]);

  const state = {

  };

  let latestThemeBuilderTheme = state.customTheme;

  const status = document.getElementById("status");

  function isIOSDevice() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  }

  function setStatus(message, error = false) {
    status.textContent = message;
    status.hidden = !message;
    status.classList.toggle("error", error);
  }

  function optionName(options, id) {
    return (options.find(item => item.id === id) || {}).name || id;
  }

  function normalizeHexColor(color) {
    const value = String(color || "").trim();
    const match = value.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);

    if (!match) return null;

    let hex = match[1];
    if (hex.length === 3) {
      hex = hex.split("").map(ch => ch + ch).join("");
    }

    return "#" + hex.toLowerCase();
  }

  function mixHexColors(color, mixWith, amount) {
    const base = normalizeHexColor(color);
    const target = normalizeHexColor(mixWith);

    if (!base || !target) return color;

    const ratio = Math.max(0, Math.min(1, Number(amount) || 0));

    const mixed = [1, 3, 5].map(index => {
      const start = parseInt(base.slice(index, index + 2), 16);
      const end = parseInt(target.slice(index, index + 2), 16);
      return Math.round(start + (end - start) * ratio)
        .toString(16)
        .padStart(2, "0");
    });

    return "#" + mixed.join("");
  }

  function readableTextForBackground(color) {
    const hexColor = normalizeHexColor(color);

    if (!hexColor) return "#ffffff";

    const rgb = [1, 3, 5].map(index =>
      parseInt(hexColor.slice(index, index + 2), 16) / 255
    );

    const linear = rgb.map(channel =>
      channel <= 0.03928
        ? channel / 12.92
        : Math.pow((channel + 0.055) / 1.055, 2.4)
    );

    const luminance =
      0.2126 * linear[0] +
      0.7152 * linear[1] +
      0.0722 * linear[2];

    const contrastWithWhite = 1.05 / (luminance + 0.05);
    const contrastWithBlack = (luminance + 0.05) / 0.05;

    return contrastWithBlack > contrastWithWhite ? "#000000" : "#ffffff";
  }



  function headerTextColorForGradient(beginColor, endColor) {
    const begin = normalizeHexColor(beginColor) || DEFAULT_CUSTOM_THEME.heroBegin;
    const end = normalizeHexColor(endColor) || begin;
    const midpoint = mixHexColors(begin, end, 0.5);
    const midpointRgb = htmlHexToRgb(midpoint);
    const midpointLuminance = relativeLuminanceFromRgb(
      midpointRgb.red,
      midpointRgb.green,
      midpointRgb.blue
    );

    // For image-generated themes, favor white on medium-dark headers.
    // The normal maximum-contrast test switches to black surprisingly early,
    // which can look wrong on photographic or shaded gradients.
    return midpointLuminance < 0.42 ? "#ffffff" : "#000000";
  }

  function imageGeneratedHeaderTextCss(color) {
    const textColor = normalizeHexColor(color) || "#ffffff";

    return [
      "/* Auto-generated from image: keep the website title and subtitle readable over the header gradient. */",
      ".hero,",
      ".hero h1,",
      ".hero-copy {",
      `  color: ${textColor};`,
      `  -webkit-text-fill-color: ${textColor};`,
      "}"
    ].join("\n");
  }

  function hexToRgba(color, alpha) {
    const hex = normalizeHexColor(color);
    if (!hex) return color;
    const rgb = [1, 3, 5].map(index => parseInt(hex.slice(index, index + 2), 16));
    return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${Math.max(0, Math.min(1, Number(alpha) || 0))})`;
  }

  function extractHexColorsFromCss(value) {
    return String(value || "").match(/#[0-9a-f]{3}(?:[0-9a-f]{3})?/gi) || [];
  }

  function cssColorToHex(value) {
    const text = String(value || "").trim();
    const hex = normalizeHexColor(text);
    if (hex) return hex;

    const rgbaMatch = text.match(/^rgba?\(\s*(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})/i);
    if (!rgbaMatch) return null;

    const rgb = rgbaMatch.slice(1, 4).map(channel =>
      Math.max(0, Math.min(255, Number(channel) || 0))
        .toString(16)
        .padStart(2, "0")
    );

    return "#" + rgb.join("");
  }

  function extractCssColors(value) {
    return String(value || "").match(/#[0-9a-f]{3}(?:[0-9a-f]{3})?|rgba?\([^)]*\)|hsla?\([^)]*\)/gi) || [];
  }

  function replaceLastCssColor(value, color) {
    const hex = normalizeHexColor(color);
    if (!hex) return String(value || "");
    const css = String(value || "").trim();
    const colorPattern = /(#[0-9a-f]{3}(?:[0-9a-f]{3})?|rgba?\([^)]*\)|hsla?\([^)]*\))/gi;
    const matches = [...css.matchAll(colorPattern)];
    if (!matches.length) return `0 12px 28px ${hexToRgba(hex, .16)}`;

    const last = matches[matches.length - 1];
    const originalColor = last[0];
    const rgb = hex.match(/[0-9a-f]{2}/gi).map(component => parseInt(component, 16));
    let replacement = hex;

    const rgbaMatch = originalColor.match(/^rgba\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*([^)]*?)\s*\)$/i);
    const rgbMatch = originalColor.match(/^rgb\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*\)$/i);

    if (rgbaMatch) {
      replacement = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${rgbaMatch[1].trim()})`;
    } else if (rgbMatch) {
      replacement = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    }

    return css.slice(0, last.index) + replacement + css.slice(last.index + originalColor.length);
  }

  function updateHeroCssFieldFromGradient(modalRoot) {
    if (!modalRoot) return;
    const heroField = findThemeBuilderField(modalRoot, "hero");
    const beginField = findThemeBuilderField(modalRoot, "heroBegin");
    const endField = findThemeBuilderField(modalRoot, "heroEnd");
    if (!heroField || !beginField || !endField) return;

    const begin = normalizeHexColor(beginField.value) || DEFAULT_CUSTOM_THEME.heroBegin;
    const end = normalizeHexColor(endField.value) || DEFAULT_CUSTOM_THEME.heroEnd;
    heroField.value = `linear-gradient(135deg,${begin},${end})`;
  }

  function parseBooleanLike(value, defaultValue) {
    if (typeof value === "boolean") return value;
    if (typeof value === "number") return value !== 0;
    const text = String(value ?? "").trim().toLowerCase();
    if (["true", "1", "yes", "on"].includes(text)) return true;
    if (["false", "0", "no", "off"].includes(text)) return false;
    return !!defaultValue;
  }

  function slugify(text, fallback = "tune") {
    const value = String(text || "")
      .normalize("NFKD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .slice(0, 60);
    return value || fallback;
  }

  function extractField(abc, field) {
    const match = abc.match(new RegExp("^" + field + "\\s*:\\s*(.+)$", "mi"));
    return match ? match[1].trim() : "";
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeHtmlAllowBreaks(value) {
    const breakToken = "__ABC_WEBSITE_BUILDER_BR__";
    return escapeHtml(
      String(value ?? "").replace(/<br\s*\/?>/gi, breakToken)
    )
      .replaceAll(breakToken, "<br>")
      .replace(/\n/g, "<br>");
  }

  function isSafeUserLinkUrl(value) {
    const url = String(value || "").trim();
    if (!url) return false;

    if (/^(?:https?:|mailto:|tel:)/i.test(url)) return true;
    return /^(?:#|\/(?!\/)|\.\.?\/)/.test(url);
  }

  function escapeHtmlAllowLinksAndBreaks(value) {
    const tokens = [];
    const tokenPrefix = "\uE000ABC_LINK_";
    const tokenSuffix = "_END\uE001";

    const withLinkTokens = String(value ?? "").replace(
      /<a\b([^>]*)>([\s\S]*?)<\/a\s*>/gi,
      (match, attributes, linkText) => {
        const hrefMatch = attributes.match(
          /\bhref\s*=\s*(["'])(.*?)\1/i
        );

        if (!hrefMatch) return match;

        const href = hrefMatch[2].trim();
        if (!isSafeUserLinkUrl(href)) return match;

        const targetMatch = attributes.match(
          /\btarget\s*=\s*(["'])(.*?)\1/i
        );
        const openInNewTab =
          targetMatch && targetMatch[2].trim().toLowerCase() === "_blank";

        const token = tokenPrefix + tokens.length + tokenSuffix;
        const targetAttributes = openInNewTab
          ? ' target="_blank" rel="noopener noreferrer"'
          : "";

        tokens.push(
          `<a href="${escapeHtml(href)}"${targetAttributes}>${escapeHtmlAllowBreaks(linkText)}</a>`
        );
        return token;
      }
    );

    let result = escapeHtmlAllowBreaks(withLinkTokens);

    tokens.forEach((linkHtml, index) => {
      result = result.replaceAll(
        tokenPrefix + index + tokenSuffix,
        linkHtml
      );
    });

    return result;
  }

  function ensureTxtExtension(filename) {
    let safeName = String(filename || "").trim();
    if (!safeName) safeName = "website-settings";
    safeName = safeName.replace(/[\/:*?"<>|]+/g, "-");
    if (!/\.txt$/i.test(safeName)) {
      safeName = safeName.replace(/\.[^.\/]*$/, "") + ".txt";
    }
    return safeName;
  }

  function themeNameToFilename(themeName, fallback = "custom-theme.txt") {
    let safeName = String(themeName || "").trim();

    if (!safeName) {
      return ensureTxtExtension(fallback);
    }

    safeName = safeName
      .normalize("NFKD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/&/g, " and ")
      .replace(/[^a-z0-9]+/gi, "-")
      .replace(/^-+|-+$/g, "")
      .toLowerCase();

    if (!safeName) {
      safeName = String(themeName || "custom-theme")
        .trim()
        .replace(/[\/:*?"<>|]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    return ensureTxtExtension(safeName || fallback);
  }

  async function promptThemeFilename(themeName) {
    const defaultName = themeNameToFilename(themeName, sessionThemeFilename || "custom-theme.txt");
    const result = await DayPilot.Modal.form(
      [{ name: "Theme filename", id: "filename", type: "text" }],
      { filename: defaultName },
      { top: 150 },
      { title: "Save Custom Theme", width: 470, okText: "Save", cancelText: "Cancel" }
    );

    if (result.canceled) return null;

    const filename = ensureTxtExtension(result.result.filename || defaultName);
    sessionThemeFilename = filename;
    return filename;
  }

  function normalizeCustomTheme(rawTheme) {
    const source = rawTheme && typeof rawTheme === "object" && !Array.isArray(rawTheme)
      ? (rawTheme.theme && typeof rawTheme.theme === "object" && !Array.isArray(rawTheme.theme)
          ? rawTheme.theme
          : rawTheme)
      : {};

    const theme = { ...DEFAULT_CUSTOM_THEME };

    CUSTOM_THEME_FIELDS.forEach(field => {
      if (!Object.prototype.hasOwnProperty.call(source, field)) return;
      if (CUSTOM_THEME_BOOLEAN_FIELDS.has(field)) {
        theme[field] = parseBooleanLike(source[field], DEFAULT_CUSTOM_THEME[field]);
        return;
      }
      const value = String(source[field] ?? "").trim();
      if (value) theme[field] = value;
    });

    if (Object.prototype.hasOwnProperty.call(source, "customCss") &&
        !Object.prototype.hasOwnProperty.call(source, "advancedCss")) {
      theme.advancedCss = stripGeneratedHeaderCssFromCustomCss(source.customCss);
    }

    CUSTOM_THEME_COLOR_FIELDS.forEach(field => {
      theme[field] = normalizeHexColor(theme[field]) || DEFAULT_CUSTOM_THEME[field];
    });

    const heroColors = extractCssColors(theme.hero)
      .map(cssColorToHex)
      .filter(Boolean);

    if (!Object.prototype.hasOwnProperty.call(source, "heroBegin")) {
      theme.heroBegin = normalizeHexColor(heroColors[0]) || normalizeHexColor(theme.primary) || DEFAULT_CUSTOM_THEME.heroBegin;
    }
    if (!Object.prototype.hasOwnProperty.call(source, "heroEnd")) {
      theme.heroEnd = normalizeHexColor(heroColors[1]) || normalizeHexColor(theme.secondary) || DEFAULT_CUSTOM_THEME.heroEnd;
    }

    const shadowColors = extractCssColors(theme.shadow);
    if (!Object.prototype.hasOwnProperty.call(source, "shadowColor")) {
      theme.shadowColor = cssColorToHex(shadowColors[shadowColors.length - 1]) || DEFAULT_CUSTOM_THEME.shadowColor;
    }

    const suppliedHero = Object.prototype.hasOwnProperty.call(source, "hero")
      ? String(source.hero || "").trim()
      : "";

    theme.hero = suppliedHero || `linear-gradient(135deg,${theme.heroBegin},${theme.heroEnd})`;
    theme.shadow = replaceLastCssColor(theme.shadow, theme.shadowColor);

    if (Object.prototype.hasOwnProperty.call(source, "customCss") &&
        !Object.prototype.hasOwnProperty.call(source, "includeBuiltInAdvancedCss")) {
      theme.includeBuiltInAdvancedCss = !!String(theme.advancedCss || "").trim();
    }

    theme.includeHeaderOrnaments = parseBooleanLike(theme.includeHeaderOrnaments, true);
    theme.includeHeaderGraphics = parseBooleanLike(theme.includeHeaderGraphics, true);
    theme.includeBuiltInAdvancedCss = parseBooleanLike(theme.includeBuiltInAdvancedCss, false);
    theme.customCss = theme.includeBuiltInAdvancedCss ? String(theme.advancedCss || "") : "";

    return theme;
  }

  function validateCustomTheme(rawTheme) {
    const source = rawTheme && typeof rawTheme === "object" && !Array.isArray(rawTheme)
      ? (rawTheme.theme && typeof rawTheme.theme === "object" && !Array.isArray(rawTheme.theme)
          ? rawTheme.theme
          : rawTheme)
      : null;

    if (!source) {
      return { theme: null, errors: ["The file does not contain a custom theme object."] };
    }

    const errors = [];
    const theme = normalizeCustomTheme(source);

    CUSTOM_THEME_COLOR_FIELDS.forEach(field => {
      if (Object.prototype.hasOwnProperty.call(source, field) && !normalizeHexColor(source[field])) {
        errors.push(`${field} must be a valid hex color, such as #167047.`);
      }
    });

    ["font", "radius", "shadow", "ornament", "name"].forEach(field => {
      if (Object.prototype.hasOwnProperty.call(source, field) && !String(source[field] ?? "").trim()) {
        errors.push(`${field} cannot be blank.`);
      }
    });

    CUSTOM_THEME_BOOLEAN_FIELDS.forEach(field => {
      if (!Object.prototype.hasOwnProperty.call(source, field)) return;
      const value = source[field];
      if (typeof value === "boolean") return;
      if (typeof value === "number" && (value === 0 || value === 1)) return;
      const text = String(value ?? "").trim().toLowerCase();
      if (!["true", "1", "yes", "on", "false", "0", "no", "off"].includes(text)) {
        errors.push(`${field} must be true or false.`);
      }
    });

    return { theme: errors.length ? null : theme, errors };
  }

  function jsSingleQuotedString(value) {
    return "'" + String(value ?? "")
      .replace(/\\/g, "\\\\")
      .replace(/'/g, "\\'")
      .replace(/\r/g, "\\r")
      .replace(/\n/g, "\\n") + "'";
  }

  function jsTemplateLiteralString(value) {
    return "`" + String(value ?? "")
      .replace(/\\/g, "\\\\")
      .replace(/`/g, "\\`")
      .replace(/\$\{/g, "\\${") + "`";
  }

  function cssContentString(value) {
    return '"' + String(value ?? "")
      .replace(/\\/g, "\\\\")
      .replace(/"/g, '\\"')
      .replace(/\r/g, " ")
      .replace(/\n/g, " ") + '"';
  }

  const THEME_BUILDER_HEADER_CSS_BEGIN = "/* Theme Builder generated header decoration CSS: begin */";
  const THEME_BUILDER_HEADER_CSS_END = "/* Theme Builder generated header decoration CSS: end */";

  function stripGeneratedHeaderCssFromCustomCss(css) {
    return String(css || "")
      .replace(new RegExp(
        THEME_BUILDER_HEADER_CSS_BEGIN.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") +
        "[\\s\\S]*?" +
        THEME_BUILDER_HEADER_CSS_END.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"),
        "g"
      ), "")
      .trim();
  }

  function generatedBuiltInHeaderCssForTheme(theme) {
    const t = normalizeCustomTheme(theme);
    const rules = [];

    if (t.includeHeaderGraphics) {
      rules.push(`
    .hero {
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at clamp(136px,21.6vw,388px) clamp(56px,5.5vw,86px), color-mix(in srgb,var(--accent) 34%,transparent) 0 clamp(46px,2.8vw,58px), transparent clamp(47px,2.9vw,60px)),
        ${t.hero || DEFAULT_CUSTOM_THEME.hero};
    }`);
    }

    if (t.includeHeaderOrnaments) {
      rules.push(`
    .hero {
      position:relative;
      overflow:hidden;
    }
    .hero .page-width {
      position:relative;
      z-index:2;
    }
    .hero h1 {
      position:relative;
      z-index:2;
    }
    .hero h1::before,
    .hero h1::after {
      position:absolute;
      z-index:-1;
      top:calc(50% + clamp(16px,1.5vw,24px));
      transform:translateY(-50%);
      content:${cssContentString(t.ornament || "•")};
      color:var(--accent);
      font-size:clamp(62px,5.2vw,94px);
      line-height:1;
      opacity:.55;
      pointer-events:none;
    }
    .hero h1::before {
      left:calc((100% - 100vw) / 2 + clamp(34px,8.5vw,190px));
    }
    .hero h1::after {
      right:calc((100% - 100vw) / 2 + clamp(34px,8.5vw,190px));
    }
    @media (max-width:720px) {
      .hero h1::before,
      .hero h1::after {
        display:none;
      }
    }`);
    }

    const css = rules.join("\n").trim();
    return css
      ? [THEME_BUILDER_HEADER_CSS_BEGIN, css, THEME_BUILDER_HEADER_CSS_END].join("\n")
      : "";
  }

  function formatCustomThemeAsBuiltInThemeSource(theme) {
    const t = normalizeCustomTheme(theme);
    const scalarFields = [
      "name", "font", "bg", "panel", "ink", "muted", "primary", "secondary",
      "accent", "line", "hero", "radius", "shadow", "ornament"
    ];
    const booleanFields = [
      "includeHeaderOrnaments", "includeHeaderGraphics", "includeBuiltInAdvancedCss"
    ];

    const advancedCss = t.includeBuiltInAdvancedCss
      ? String(t.advancedCss || "").trim()
      : "";
    const generatedHeaderCss = generatedBuiltInHeaderCssForTheme(t);
    const customCss = [generatedHeaderCss, advancedCss]
      .map(value => String(value || "").trim())
      .filter(Boolean)
      .join("\n\n");

    const lines = ["{"];
    const entries = [];

    scalarFields.forEach(field => {
      entries.push(`  ${field}: ${jsSingleQuotedString(t[field])}`);
    });

    booleanFields.forEach(field => {
      entries.push(`  ${field}: ${t[field] ? "true" : "false"}`);
    });

    if (advancedCss) {
      entries.push("  advancedCss: " + jsTemplateLiteralString(advancedCss));
    }

    if (customCss) {
      entries.push("  customCss: " + jsTemplateLiteralString(customCss));
    }

    entries.forEach((entry, index) => {
      lines.push(entry + (index === entries.length - 1 ? "" : ","));
    });

    lines.push("}");
    return lines.join("\n");
  }

  function parseCustomThemeText(text) {
    const sourceText = String(text || "").trim();
    if (!sourceText) {
      throw new Error("The selected custom theme file is empty.");
    }

    const candidates = [sourceText];
    const firstBrace = sourceText.indexOf("{");
    const lastBrace = sourceText.lastIndexOf("}");
    if (firstBrace >= 0 && lastBrace > firstBrace) {
      candidates.push(sourceText.slice(firstBrace, lastBrace + 1));
    }

    let lastError = null;

    for (const candidate of candidates) {
      try {
        // The Theme Builder is a developer-only helper and the file is selected
        // locally by the user. This allows loading the same object-literal text
        // that can be pasted into the built-in theme table.
        return Function('"use strict"; return (' + candidate.replace(/,\s*$/, "") + ');')();
      } catch (error) {
        lastError = error;
      }
    }

    throw lastError || new Error("The selected custom theme file is not a valid built-in theme object literal.");
  }

  function downloadThemeFile(filename, theme) {
    const text = formatCustomThemeAsBuiltInThemeSource(theme);
    const blob = new Blob([text + "\n"], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement("a");
    anchor.href = url;
    anchor.download = filename;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function getOpenThemeBuilderModalRoot() {
    return document.getElementById("theme-builder-root");
  }

  function findThemeBuilderField(modalRoot, fieldId) {
    if (!modalRoot) return null;

    return modalRoot.querySelector('[data-theme-field="' + fieldId + '"]') ||
      modalRoot.querySelector(
        'input[name="' + fieldId + '"], ' +
        'select[name="' + fieldId + '"], ' +
        'textarea[name="' + fieldId + '"], ' +
        'input[id="' + fieldId + '"], ' +
        'select[id="' + fieldId + '"], ' +
        'textarea[id="' + fieldId + '"]'
      );
  }

  function getCurrentThemeFromOpenThemeBuilderDialog() {
    const modalRoot = getOpenThemeBuilderModalRoot();
    const current = normalizeCustomTheme(state.customTheme || DEFAULT_CUSTOM_THEME);

    if (!modalRoot) return current;

    CUSTOM_THEME_FIELDS.forEach(fieldId => {
      const field = findThemeBuilderField(modalRoot, fieldId);
      if (!field) return;
      current[fieldId] = field.type === "checkbox"
        ? !!field.checked
        : String(field.value || "").trim();
    });

    return current;
  }

  function applyThemeValuesInOpenThemeBuilderDialog(theme) {
    const modalRoot = getOpenThemeBuilderModalRoot();
    if (!modalRoot) return false;

    // Prevent preview-only advanced CSS from the previously loaded built-in
    // theme from remaining visible while the next theme's fields are being
    // copied into the editor.
    clearThemeBuilderPreviewCustomCss();

    const normalized = normalizeCustomTheme(theme);
    CUSTOM_THEME_FIELDS.forEach(fieldId => {
      const field = findThemeBuilderField(modalRoot, fieldId);
      if (!field) return;
      if (field.type === "checkbox") {
        field.checked = !!normalized[fieldId];
      } else {
        const value = String(normalized[fieldId] || "");
        if (field.tagName === "SELECT" && !Array.from(field.options).some(option => option.value === value)) {
          field.insertBefore(new Option("Loaded theme font", value), field.firstChild);
        }
        field.value = value;
      }
      field.dispatchEvent(new Event("input", { bubbles: true }));
      field.dispatchEvent(new Event("change", { bubbles: true }));
    });

    latestThemeBuilderTheme = normalized;
    syncThemeBuilderColorPickers(true);
    updateThemeBuilderPreview();

    return true;
  }

  async function saveCustomThemeFromBuilder() {
    const currentTheme = getCurrentThemeFromOpenThemeBuilderDialog();
    const validation = validateCustomTheme(currentTheme);

    if (!validation.theme) {
      await DayPilot.Modal.alert(
        "The current custom theme could not be saved because it contains invalid values:<br><br>" +
        escapeHtml(validation.errors.join("\n")).replace(/\n/g, "<br>"),
        { title: "Invalid Custom Theme", okText: "OK", top: 150 }
      );
      return;
    }

    const filename = await promptThemeFilename(validation.theme.name);
    if (!filename) return;

    downloadThemeFile(filename, validation.theme);
    setStatus(`Saved custom theme to ${filename}.`);
  }

  async function loadCustomThemeIntoBuilder() {
    const file = await selectSettingsFile();
    if (!file) return;

    try {
      const text = await file.text();
      const parsed = parseCustomThemeText(text);
      const validation = validateCustomTheme(parsed);

      if (!validation.theme) {
        throw new Error(validation.errors.join("\n"));
      }

      applyThemeValuesInOpenThemeBuilderDialog(validation.theme);
      setStatus(`Loaded custom theme from ${file.name}. Edit the loaded values or save a theme file when ready.`);
    } catch (error) {
      console.warn("Unable to load custom theme file.", error);
      await DayPilot.Modal.alert(
        "The selected custom theme file could not be loaded.<br><br>" +
        escapeHtml(error.message || String(error)).replace(/\n/g, "<br>"),
        { title: "Invalid Custom Theme File", okText: "OK", top: 150 }
      );
      setStatus("The selected custom theme file could not be loaded.", true);
    }
  }

  function themeBuilderFieldRow(modalRoot, fieldId) {
    const field = findThemeBuilderField(modalRoot, fieldId);
    if (!field) return null;

    return field.closest(".modal_flat_form_item") ||
      field.closest(".modal_default_form_item") ||
      field.closest(".modal_flat_form_field") ||
      field.closest(".modal_default_form_field");
  }

  function moveThemeBuilderField(fieldId, destinationId, wide = false) {
    const destination = document.getElementById(destinationId);
    const modalRoot = getOpenThemeBuilderModalRoot();
    if (!destination || !modalRoot) return false;

    const row = themeBuilderFieldRow(modalRoot, fieldId);
    if (!row) return false;

    row.classList.toggle("theme-builder-wide-field", !!wide);
    destination.appendChild(row);
    return true;

  function themeBuilderPayloadField() {
    const modalRoot = getOpenThemeBuilderModalRoot();
    if (!modalRoot) return null;
    return modalRoot.querySelector('input[name="themeJson"], input[id="themeJson"]');

  function updateThemeBuilderPayloadField() {
    const currentTheme = normalizeCustomTheme(getCurrentThemeFromOpenThemeBuilderDialog());
    latestThemeBuilderTheme = currentTheme;

    const payload = themeBuilderPayloadField();
    if (!payload) return;
    payload.value = JSON.stringify(currentTheme);

  function activateThemeBuilderTab(tabId) {
    const root = document.getElementById("theme-builder-root");
    if (!root) return;

    root.querySelectorAll(".theme-builder-tab-button").forEach(button => {
      const active = button.dataset.themeBuilderTab === tabId;
      button.classList.toggle("active", active);
      button.setAttribute("aria-selected", active ? "true" : "false");
    });

    root.querySelectorAll(".theme-builder-tab-panel").forEach(panel => {
      panel.classList.toggle("active", panel.id === tabId);
    });
  }

  function initializeThemeBuilderTabs() {
    const root = document.getElementById("theme-builder-root");
    if (!root || root.dataset.tabsReady === "true") return;

    root.querySelectorAll(".theme-builder-tab-button").forEach(button => {
      button.addEventListener("click", () => {
        activateThemeBuilderTab(button.dataset.themeBuilderTab);
      });

    activateThemeBuilderTab("theme_builder_basic_panel");

  function hideThemeBuilderPayloadRow() {
    const payload = themeBuilderPayloadField();
    if (!payload || payload.dataset.hiddenReady === "true") return;

    const row = payload.closest(".modal_flat_form_item") ||
      payload.closest(".modal_default_form_item") ||
      payload.closest(".modal_flat_form_field") ||

      row.classList.add("theme-builder-form-json-row");

  function addImportantToPreviewCss(css) {
    return String(css || "").replace(/:([^;{}]+);/g, (match, value) => {
      return /!important/i.test(value) ? match : `:${value} !important;`;
    });
  }

  function customCssForThemeBuilderPreview(css) {
    let text = String(css || "").trim();
    if (!text) return "";

    const replacements = [
      [/\bbody\b/g, "#theme-builder-preview-area"],
      [/\.hero\s+\.page-width/g, "#theme-preview-hero"],
      [/\.hero\s+h1/g, "#theme-preview-title"],
      [/\.hero-copy/g, "#theme-preview-subtitle"],
      [/\.hero/g, "#theme-preview-hero"],
      [/\.table-of-contents::before/g, "#theme-preview-toc::before"],
      [/\.score-panel::before/g, "#theme-preview-panel-one::before, #theme-preview-panel-two::before"],
      [/\.table-of-contents/g, "#theme-preview-toc"],
      [/\.score-panel/g, "#theme-preview-panel-one, #theme-preview-panel-two"],
      [/\.paper/g, "#theme-preview-toc, #theme-preview-panel-one, #theme-preview-panel-two"],
      [/\.tune-header\s+h2/g, "#theme-preview-heading-one, #theme-preview-heading-two"],
      [/\.toc-links\s+a/g, "#theme-preview-button-one, #theme-preview-button-two, #theme-preview-toc-link-one, #theme-preview-toc-link-two"],
      [/\.back-to-toc/g, "#theme-preview-button-one, #theme-preview-button-two"],
      [/\.section-divider::before/g, "#theme-preview-divider::before, #theme-preview-divider-two::before"],
      [/\.section-divider::after/g, "#theme-preview-divider::after, #theme-preview-divider-two::after"],
      [/\.section-divider\s+span/g, "#theme-preview-ornament, #theme-preview-ornament-two"],
      [/\.section-divider/g, "#theme-preview-divider, #theme-preview-divider-two"],
      [/\.site-footer/g, "#theme-preview-footer"],
      [/\.chapter-label/g, "#theme-preview-ornament, #theme-preview-ornament-two"],
      [/\.toc-links\s+span/g, "#theme-preview-toc-badge-one, #theme-preview-toc-badge-two"]
    ];

    replacements.forEach(([pattern, replacement]) => {
      text = text.replace(pattern, replacement);
    });

    // Theme Builder previews must stay inside the preview card. Some built-in
    // theme CSS uses fixed body pseudo-elements for full-page animated
    // backgrounds; when mapped to the preview, convert those fixed layers to
    // absolute layers so they are clipped by the preview frame and disappear
    // cleanly when another theme is selected.
    text = text.replace(/\bposition\s*:\s*fixed\s*;/gi, "position: absolute;");

    // Scope preview-only advanced CSS to an active preview class. This prevents
    // any old preview CSS from matching after another theme is loaded, even if a
    // browser delays removing the old style element.
    text = text.replace(/#theme-builder-preview-area/g, "#theme-builder-preview-area.theme-builder-preview-custom-css-active");

    return addImportantToPreviewCss(text);
  }

  function clearThemeBuilderPreviewCustomCss() {
    const style = document.getElementById("theme-builder-preview-custom-css");
    const preview = document.getElementById("theme-builder-preview-area");

    if (preview) {
      preview.classList.remove("theme-builder-preview-custom-css-active");
      preview.classList.add("theme-builder-preview-custom-css-clearing");
    }

    if (style) {
      style.textContent = "";
      if (style.parentNode) {
        style.parentNode.removeChild(style);
      } else if (typeof style.remove === "function") {
        style.remove();
      }
    }

    if (preview) {
      // Force iPad/Safari to discard any composited pseudo-element animation
      // layer from the previous theme before the next theme is displayed.
      void preview.offsetHeight;
      requestAnimationFrame(() => {
        preview.classList.remove("theme-builder-preview-custom-css-clearing");
      });
    }
  }

  function updateThemeBuilderPreviewCustomCss(theme) {
    const styleId = "theme-builder-preview-custom-css";
    const preview = document.getElementById("theme-builder-preview-area");
    let style = document.getElementById(styleId);
    const css = theme && theme.includeBuiltInAdvancedCss
      ? customCssForThemeBuilderPreview(theme.advancedCss || theme.customCss || "")
      : "";

    if (!css) {
      clearThemeBuilderPreviewCustomCss();
      return;
    }

    if (!style) {
      style = document.createElement("style");
      style.id = styleId;
      document.head.appendChild(style);
    }

    style.textContent = css;

    if (preview) {
      preview.classList.add("theme-builder-preview-custom-css-active");
    }
  }

  function setThemeBuilderPreviewStyle(element, property, value) {
    if (!element) return;

  function styleTextForPreviewDocument(value) {
    return String(value || "").replace(/<\/style/gi, "<\\/style");

  function extractFullPreviewHeroTextColor(css) {
    const text = String(css || "");
    const selectorBlocks = [...text.matchAll(/([^{}]+)\{([^}]*)\}/g)];

    for (let index = selectorBlocks.length - 1; index >= 0; index -= 1) {
      const selector = selectorBlocks[index][1] || "";
      if (!/(^|[,\s])\.hero(?:\s|,|$)|(^|[,\s])\.hero\s+h1(?:\s|,|$)|(^|[,\s])\.hero-copy(?:\s|,|$)/i.test(selector)) {
        continue;
      }

      const declarationBlock = selectorBlocks[index][2] || "";
      const colorMatch = declarationBlock.match(/(?:^|;)\s*color\s*:\s*([^;]+)\s*;?/i);

      if (colorMatch) {
        const value = colorMatch[1].trim();
        if (value && !/^inherit$/i.test(value) && !/^currentColor$/i.test(value)) {
          return value;
        }
      }
    }

    return "";
  }

  function openFullThemePreview() {
    const theme = normalizeCustomTheme(getCurrentThemeFromOpenThemeBuilderDialog());
    updateThemeBuilderPayloadField();

    const previewWindow = window.open("", "_blank");
    if (!previewWindow) {
      setStatus("Full Screen Preview could not be opened. Please allow pop-up windows for this page and try again.", true);
      return;
    }

    previewWindow.document.open();
    previewWindow.document.write(fullThemePreviewDocumentHtml(theme));
    previewWindow.document.close();
    previewWindow.focus();
    setStatus("Opened a full simulated website preview in a new window.");
  }

  function updateThemeBuilderPreview() {
    const root = document.getElementById("theme-builder-root");
    if (!root) return;

    const theme = normalizeCustomTheme(getCurrentThemeFromOpenThemeBuilderDialog());
    const preview = document.getElementById("theme-builder-preview-area");
    const hero = document.getElementById("theme-preview-hero");
    const body = document.getElementById("theme-preview-body");
    const tocPanel = document.getElementById("theme-preview-toc");
    const tocHeading = document.getElementById("theme-preview-toc-heading");
    const tocLinks = Array.from(document.querySelectorAll(".theme-preview-toc-link"));
    const tocBadges = Array.from(document.querySelectorAll(".theme-preview-toc-badge"));
    const panels = Array.from(document.querySelectorAll(".theme-preview-panel"));
    const title = document.getElementById("theme-preview-title-text");
    const subtitle = document.getElementById("theme-preview-subtitle");
    const headings = Array.from(document.querySelectorAll(".tune-header-heading"));
    const previewTexts = Array.from(document.querySelectorAll(".theme-preview-panel p"));
    const buttons = Array.from(document.querySelectorAll(".theme-preview-button"));
    const ornaments = Array.from(document.querySelectorAll(".theme-preview-divider .chapter-label"));
    const footer = document.getElementById("theme-preview-footer");
    const headerOrnaments = Array.from(document.querySelectorAll(".theme-preview-header-ornament"));

    if (!preview || !hero || !body || !tocPanel || !panels.length) return;

    // Apply the optional mapped custom CSS first. The normal editable theme
    // controls are then applied as inline !important styles so color/font/
    // shadow edits still update the preview even when the preserved built-in
    // CSS contains !important preview rules.
    updateThemeBuilderPreviewCustomCss(theme);

    const advancedCss = theme.includeBuiltInAdvancedCss
      ? String(theme.advancedCss || theme.customCss || "")
      : "";
    const heroText = extractFullPreviewHeroTextColor(advancedCss) || "#ffffff";
    const buttonText = readableTextForBackground(theme.primary || DEFAULT_CUSTOM_THEME.primary);

    setThemeBuilderPreviewStyle(preview, "font-family", theme.font);
    setThemeBuilderPreviewStyle(preview, "background", theme.bg);
    setThemeBuilderPreviewStyle(preview, "color", theme.ink);
    preview.style.setProperty("--theme-preview-radius", theme.radius, "important");
    setThemeBuilderPreviewStyle(hero, "background", theme.hero);
    setThemeBuilderPreviewStyle(hero, "color", heroText);
    hero.style.setProperty("--theme-preview-accent", theme.accent, "important");
    hero.classList.toggle("graphics", !!theme.includeHeaderGraphics);
    setThemeBuilderPreviewStyle(body, "background", theme.bg);
    setThemeBuilderPreviewStyle(tocPanel, "background", theme.panel);
    setThemeBuilderPreviewStyle(tocPanel, "color", theme.ink);
    setThemeBuilderPreviewStyle(tocPanel, "border", "2px solid " + theme.line);
    setThemeBuilderPreviewStyle(tocPanel, "border-radius", theme.radius);
    setThemeBuilderPreviewStyle(tocPanel, "box-shadow", theme.shadow);
    panels.forEach(panel => {
      setThemeBuilderPreviewStyle(panel, "background", theme.panel);
      setThemeBuilderPreviewStyle(panel, "color", theme.ink);
      setThemeBuilderPreviewStyle(panel, "border", "2px solid " + theme.line);
      setThemeBuilderPreviewStyle(panel, "border-radius", theme.radius);
      setThemeBuilderPreviewStyle(panel, "box-shadow", theme.shadow);
    });

    if (title) {
      title.textContent = theme.name || "Custom Theme";
      setThemeBuilderPreviewStyle(title, "color", heroText);
      title.style.setProperty("-webkit-text-fill-color", heroText, "important");
    }
    if (subtitle) {
      setThemeBuilderPreviewStyle(subtitle, "color", heroText);
      subtitle.style.setProperty("-webkit-text-fill-color", heroText, "important");
    }
    if (tocHeading) setThemeBuilderPreviewStyle(tocHeading, "color", theme.ink);
    tocLinks.forEach(item => {
      setThemeBuilderPreviewStyle(item, "background", "color-mix(in srgb, " + theme.panel + " 86%, white)");
      setThemeBuilderPreviewStyle(item, "color", theme.ink);
      setThemeBuilderPreviewStyle(item, "border", "1px solid " + theme.line);
      setThemeBuilderPreviewStyle(item, "border-radius", "calc(" + theme.radius + " / 2)");
    });
    tocBadges.forEach(item => {
      setThemeBuilderPreviewStyle(item, "background", theme.primary);
      setThemeBuilderPreviewStyle(item, "color", "#fff");
      setThemeBuilderPreviewStyle(item, "border", "2px solid " + theme.accent);
    });
    headings.forEach(item => {
      setThemeBuilderPreviewStyle(item, "color", theme.ink);
    });
    previewTexts.forEach(item => {
      setThemeBuilderPreviewStyle(item, "color", theme.muted);
    });
    buttons.forEach(item => {
      setThemeBuilderPreviewStyle(item, "background", theme.primary);
      setThemeBuilderPreviewStyle(item, "color", "#fff");
      setThemeBuilderPreviewStyle(item, "border", "1px solid " + theme.accent);
    });

      setThemeBuilderPreviewStyle(footer, "border-top", "4px solid " + theme.accent);

    headerOrnaments.forEach(item => {
      item.textContent = theme.ornament || "•";
      setThemeBuilderPreviewStyle(item, "color", theme.accent);
      setThemeBuilderPreviewStyle(item, "display", theme.includeHeaderOrnaments ? "block" : "none");

    ornaments.forEach(item => {
      item.textContent = theme.ornament || "•";
      setThemeBuilderPreviewStyle(item, "color", theme.secondary);

    updateThemeBuilderPayloadField();

  function syncThemeBuilderColorPickers(forceRefresh = false) {
    const modalRoot = getOpenThemeBuilderModalRoot();
    if (!modalRoot) return;

    CUSTOM_THEME_COLOR_PICKER_FIELDS.forEach(fieldId => {
      const textField = findThemeBuilderField(modalRoot, fieldId);
      if (!textField) return;

      const picker = modalRoot.querySelector('[data-theme-color-picker="' + fieldId + '"]');
      if (!picker) return;

      picker.value = normalizeHexColor(textField.value) || DEFAULT_CUSTOM_THEME[fieldId] || "#000000";

      if (!forceRefresh && textField.dataset.colorPickerReady === "true") return;

      if (textField.dataset.colorPickerReady === "true") return;

      picker.addEventListener("input", () => {
        textField.value = picker.value;
        if (fieldId === "heroBegin" || fieldId === "heroEnd") {
          updateHeroCssFieldFromGradient(modalRoot);
        }
        textField.dispatchEvent(new Event("input", { bubbles: true }));
        textField.dispatchEvent(new Event("change", { bubbles: true }));
        updateThemeBuilderPreview();
      });

      textField.addEventListener("input", () => {
        const hex = normalizeHexColor(textField.value);
        if (hex) picker.value = hex;
        updateThemeBuilderPreview();
      });

      textField.addEventListener("change", () => {
        const hex = normalizeHexColor(textField.value);
        if (hex) {
          textField.value = hex;
          picker.value = hex;
        }
        if (fieldId === "heroBegin" || fieldId === "heroEnd") {
          updateHeroCssFieldFromGradient(modalRoot);
        }
        updateThemeBuilderPreview();
      });

      textField.dataset.colorPickerReady = "true";
    });
  }

  function initializeThemeBuilderGradientSwap() {
    const modalRoot = getOpenThemeBuilderModalRoot();
    const button = document.getElementById("theme-builder-gradient-swap-action");
    if (!modalRoot || !button || button.dataset.swapReady === "true") return;

    button.addEventListener("click", () => {
      const beginField = findThemeBuilderField(modalRoot, "heroBegin");
      const endField = findThemeBuilderField(modalRoot, "heroEnd");
      if (!beginField || !endField) return;

      const beginValue = beginField.value;
      beginField.value = endField.value;
      endField.value = beginValue;

      updateHeroCssFieldFromGradient(modalRoot);
      [beginField, endField].forEach(field => {
        field.dispatchEvent(new Event("input", { bubbles: true }));
        field.dispatchEvent(new Event("change", { bubbles: true }));
      });
      syncThemeBuilderColorPickers(true);
      updateThemeBuilderPreview();
    });

    button.dataset.swapReady = "true";
  }

  function initializeThemeBuilderLayout() {
    const root = document.getElementById("theme-builder-root");
    const modalRoot = getOpenThemeBuilderModalRoot();
    if (!root || !modalRoot) return false;

    initializeThemeBuilderTabs();

    CUSTOM_THEME_FIELDS.forEach(fieldId => {
      const field = findThemeBuilderField(modalRoot, fieldId);
      if (!field || field.dataset.previewReady === "true") return;
      field.addEventListener("input", updateThemeBuilderPreview);
      field.addEventListener("change", updateThemeBuilderPreview);
      field.dataset.previewReady = "true";
    });

    syncThemeBuilderColorPickers();
    initializeThemeBuilderGradientSwap();
    updateThemeBuilderPreview();
    root.dataset.layoutReady = "true";
    return CUSTOM_THEME_FIELDS.every(fieldId => !!findThemeBuilderField(modalRoot, fieldId));
  }

  function rgbComponentToHex(value) {
    return Math.max(0, Math.min(255, Number(value) || 0))
      .toString(16)
      .padStart(2, "0");
  }

  function rgbToHtmlHex(red, green, blue) {
    return "#" +
      rgbComponentToHex(red) +
      rgbComponentToHex(green) +
      rgbComponentToHex(blue);
  }

  function htmlHexToRgb(color) {
    const hex = normalizeHexColor(color);
    if (!hex) return { red: 0, green: 0, blue: 0 };
    return {
      red: parseInt(hex.slice(1, 3), 16),
      green: parseInt(hex.slice(3, 5), 16),
      blue: parseInt(hex.slice(5, 7), 16)
    };
  }

  function relativeLuminanceFromRgb(red, green, blue) {
    const channels = [red, green, blue].map(value => {
      const channel = Math.max(0, Math.min(255, Number(value) || 0)) / 255;
      return channel <= 0.03928
        ? channel / 12.92
        : Math.pow((channel + 0.055) / 1.055, 2.4);
    });

    return 0.2126 * channels[0] + 0.7152 * channels[1] + 0.0722 * channels[2];
  }

  function colorStatsFromRgb(red, green, blue) {
    const r = Math.max(0, Math.min(255, Number(red) || 0)) / 255;
    const g = Math.max(0, Math.min(255, Number(green) || 0)) / 255;
    const b = Math.max(0, Math.min(255, Number(blue) || 0)) / 255;
    const max = Math.max(r, g, b);
    const min = Math.min(r, g, b);
    const delta = max - min;
    const lightness = (max + min) / 2;
    const saturation = delta === 0 ? 0 : delta / (1 - Math.abs(2 * lightness - 1));
    let hue = 0;

    if (delta !== 0) {
      if (max === r) hue = ((g - b) / delta) % 6;
      else if (max === g) hue = (b - r) / delta + 2;
      else hue = (r - g) / delta + 4;
      hue = Math.round(hue * 60);
      if (hue < 0) hue += 360;
    }

    return {
      hue,
      saturation,
      lightness,
      luminance: relativeLuminanceFromRgb(red, green, blue)
    };
  }

  function clampByte(value) {
    return Math.max(0, Math.min(255, Math.round(Number(value) || 0)));
  }

  function mixRgbColors(color, mixWith, amount) {
    const base = typeof color === "string" ? htmlHexToRgb(color) : color;
    const target = typeof mixWith === "string" ? htmlHexToRgb(mixWith) : mixWith;
    const ratio = Math.max(0, Math.min(1, Number(amount) || 0));

    return rgbToHtmlHex(
      clampByte(base.red + (target.red - base.red) * ratio),
      clampByte(base.green + (target.green - base.green) * ratio),
      clampByte(base.blue + (target.blue - base.blue) * ratio)
    );
  }

  function colorDistance(first, second) {
    return Math.sqrt(
      Math.pow(first.red - second.red, 2) +
      Math.pow(first.green - second.green, 2) +
      Math.pow(first.blue - second.blue, 2)
    );
  }

  function hueDistance(firstHue, secondHue) {
    const distance = Math.abs((Number(firstHue) || 0) - (Number(secondHue) || 0));
    return Math.min(distance, 360 - distance);
  }

  function avoidSolidWhitePageBackground(color, tintColor) {
    const hex = normalizeHexColor(color);
    const tint = normalizeHexColor(tintColor) || DEFAULT_CUSTOM_THEME.bg;

    if (!hex) return DEFAULT_CUSTOM_THEME.bg;

    const rgb = htmlHexToRgb(hex);
    const stats = colorStatsFromRgb(rgb.red, rgb.green, rgb.blue);

    // Auto-generated themes should avoid plain white or almost-white page
    // backgrounds. Keep the background light, but force a visible image-based
    // tint whenever the detected background is too pale or too neutral.
    if (stats.lightness >= 0.88 || (stats.lightness >= 0.82 && stats.saturation <= 0.14)) {
      let tinted = mixRgbColors(tint, "#ffffff", 0.76);
      let tintedRgb = htmlHexToRgb(tinted);
      let tintedStats = colorStatsFromRgb(tintedRgb.red, tintedRgb.green, tintedRgb.blue);

      // Some source images produce very pale beige/cream tints. Pull those a
      // little farther toward the image color so the result reads as tinted,
      // not white, while remaining a light page background.
      if (tintedStats.lightness >= 0.92 || tintedStats.saturation <= 0.10) {
        tinted = mixRgbColors(tint, "#ffffff", 0.66);
        tintedRgb = htmlHexToRgb(tinted);
        tintedStats = colorStatsFromRgb(tintedRgb.red, tintedRgb.green, tintedRgb.blue);
      }

      // Avoid accidentally creating a mid/dark background from a very dark
      // tint color. Keep the page background comfortably light while still
      // retaining a visible image-based tint.
      if (tintedStats.lightness < 0.90) {
        tinted = mixRgbColors(tinted, "#ffffff", 0.62);
        tintedRgb = htmlHexToRgb(tinted);
        tintedStats = colorStatsFromRgb(tintedRgb.red, tintedRgb.green, tintedRgb.blue);
      }

      // Final guard: if the first lightening pass still leaves the page color
      // feeling too dense, lift it again. This favors a softer pastel page
      // background without falling back to plain white.
      if (tintedStats.lightness < 0.88) {
        tinted = mixRgbColors(tinted, "#ffffff", 0.38);
      }

      return tinted;
    }

    return hex;
  }

  function analyzeImagePalette(image) {
    const sourceWidth = Math.max(1, image.naturalWidth || image.width || 1);
    const sourceHeight = Math.max(1, image.naturalHeight || image.height || 1);
    const maxAnalysisSize = 180;
    const scale = Math.min(1, maxAnalysisSize / Math.max(sourceWidth, sourceHeight));
    const width = Math.max(1, Math.round(sourceWidth * scale));
    const height = Math.max(1, Math.round(sourceHeight * scale));
    const analysisCanvas = document.createElement("canvas");
    const analysisContext = analysisCanvas.getContext("2d", { willReadFrequently: true });

    analysisCanvas.width = width;
    analysisCanvas.height = height;
    analysisContext.drawImage(image, 0, 0, width, height);

    const pixels = analysisContext.getImageData(0, 0, width, height).data;
    const buckets = new Map();

    for (let index = 0; index < pixels.length; index += 4) {
      const alpha = pixels[index + 3];
      if (alpha < 180) continue;

      const red = pixels[index];
      const green = pixels[index + 1];
      const blue = pixels[index + 2];
      const stats = colorStatsFromRgb(red, green, blue);

      // Ignore almost-white, almost-black, and very flat gray pixels while
      // building the accent palette. They are still available as fallbacks via
      // the light/dark scans below.
      const quantizedRed = red >> 4;
      const quantizedGreen = green >> 4;
      const quantizedBlue = blue >> 4;
      const key = `${quantizedRed},${quantizedGreen},${quantizedBlue}`;
      let bucket = buckets.get(key);

      if (!bucket) {
        bucket = { red: 0, green: 0, blue: 0, count: 0 };
        buckets.set(key, bucket);
      }

      bucket.red += red;
      bucket.green += green;
      bucket.blue += blue;
      bucket.count += 1;
    }

    const colors = Array.from(buckets.values())
      .filter(bucket => bucket.count > 0)
      .map(bucket => {
        const red = Math.round(bucket.red / bucket.count);
        const green = Math.round(bucket.green / bucket.count);
        const blue = Math.round(bucket.blue / bucket.count);
        return {
          red,
          green,
          blue,
          count: bucket.count,
          hex: rgbToHtmlHex(red, green, blue),
          ...colorStatsFromRgb(red, green, blue)
        };
      })
      .sort((a, b) => b.count - a.count);

    if (!colors.length) return null;

    const totalPixelCount = width * height;
    const usefulColors = colors.filter(color =>
      color.lightness > 0.07 && color.lightness < 0.94 &&
      (color.saturation > 0.08 || color.count > totalPixelCount * 0.02)
    );
    const rankedAccentColors = (usefulColors.length ? usefulColors : colors)
      .slice()
      .sort((a, b) =>
        (b.count * (0.20 + Math.pow(b.saturation, 1.85)) * Math.max(0.25, 1 - Math.abs(0.50 - b.lightness) * 0.85)) -
        (a.count * (0.20 + Math.pow(a.saturation, 1.85)) * Math.max(0.25, 1 - Math.abs(0.50 - a.lightness) * 0.85))
      );

    // Strongly favor real colors over large neutral/background regions.
    // These are the most frequently found colorful buckets, ranked by a
    // count-weighted colorfulness score. The first two entries drive the
    // top header gradient for image-generated themes.
    const colorfulRankedColors = colors
      .filter(color =>
        color.saturation >= 0.20 &&
        color.lightness >= 0.10 &&
        color.lightness <= 0.84 &&
        color.count >= Math.max(2, totalPixelCount * 0.0008)
      )
      .slice()
      .sort((a, b) =>
        (b.count * Math.pow(b.saturation, 2.15) * Math.max(0.22, 1 - Math.abs(b.lightness - 0.46) * 0.75)) -
        (a.count * Math.pow(a.saturation, 2.15) * Math.max(0.22, 1 - Math.abs(a.lightness - 0.46) * 0.75))
      );

    const colorfulHueGroups = new Map();

    rankedAccentColors.forEach(color => {
      // If a clearly colorful hue family covers a meaningful part of the
      // image, prefer it for the primary theme color instead of letting large
      // beige/cream/background areas dominate the generated theme.
      if (
        color.saturation < 0.24 ||
        color.lightness < 0.08 ||
        color.lightness > 0.82
      ) {
        return;
      }

      const hueBin = Math.round(color.hue / 45) * 45 % 360;
      let group = colorfulHueGroups.get(hueBin);

      if (!group) {
        group = {
          hueBin,
          count: 0,
          weightedSaturation: 0,
          weightedLightness: 0,
          score: 0,
          colors: []
        };
        colorfulHueGroups.set(hueBin, group);
      }

      const lightnessWeight = Math.max(0.18, 1 - Math.abs(color.lightness - 0.42) * 1.25);
      const colorfulness = Math.pow(color.saturation, 1.55) * lightnessWeight;

      group.count += color.count;
      group.weightedSaturation += color.saturation * color.count;
      group.weightedLightness += color.lightness * color.count;
      group.score += color.count * colorfulness;
      group.colors.push(color);
    });

    const dominantColorfulGroup = Array.from(colorfulHueGroups.values())
      .map(group => ({
        ...group,
        averageSaturation: group.weightedSaturation / Math.max(1, group.count),
        averageLightness: group.weightedLightness / Math.max(1, group.count)
      }))
      .filter(group =>
        group.count >= totalPixelCount * 0.035 &&
        group.averageSaturation >= 0.25
      )
      .sort((a, b) => b.score - a.score)[0] || null;

    const primaryCandidates = dominantColorfulGroup
      ? dominantColorfulGroup.colors
        .slice()
        .sort((a, b) =>
          (b.count * Math.pow(b.saturation, 1.85) * Math.max(0.2, 1 - Math.abs(b.lightness - 0.42))) -
          (a.count * Math.pow(a.saturation, 1.85) * Math.max(0.2, 1 - Math.abs(a.lightness - 0.42)))
        )
      : (colorfulRankedColors.length ? colorfulRankedColors : rankedAccentColors);

    const primary = primaryCandidates.find(color =>
      color.lightness >= 0.12 && color.lightness <= 0.76 && color.saturation >= 0.18
    ) || colorfulRankedColors.find(color =>
      color.lightness >= 0.12 && color.lightness <= 0.80 && color.saturation >= 0.16
    ) || rankedAccentColors.find(color =>
      color.lightness >= 0.16 && color.lightness <= 0.72 && color.saturation >= 0.14
    ) || rankedAccentColors[0] || colors[0];

    const secondary = colorfulRankedColors.find(color =>
      color.hex !== primary.hex &&
      color.lightness >= 0.12 && color.lightness <= 0.82 &&
      (hueDistance(color.hue, primary.hue) >= 16 || colorDistance(color, primary) >= 58)
    ) || rankedAccentColors.find(color =>
      color.hex !== primary.hex &&
      color.lightness >= 0.18 && color.lightness <= 0.78 &&
      (hueDistance(color.hue, primary.hue) >= 24 || colorDistance(color, primary) >= 82)
    ) || rankedAccentColors.find(color => color.hex !== primary.hex) || primary;

    const accent = rankedAccentColors.find(color =>
      color.hex !== primary.hex && color.hex !== secondary.hex &&
      color.saturation >= 0.18 && color.lightness >= 0.28 && color.lightness <= 0.86
    ) || secondary;

    const lightCandidate = colors.slice().sort((a, b) => {
      const aScore = a.lightness - Math.abs(a.saturation - 0.18) * 0.18 + Math.log(a.count + 1) * 0.012;
      const bScore = b.lightness - Math.abs(b.saturation - 0.18) * 0.18 + Math.log(b.count + 1) * 0.012;
      return bScore - aScore;
    })[0];

    const darkCandidate = colors.slice().sort((a, b) => {
      const aScore = (1 - a.lightness) + a.saturation * 0.12 + Math.log(a.count + 1) * 0.012;
      const bScore = (1 - b.lightness) + b.saturation * 0.12 + Math.log(b.count + 1) * 0.012;
      return bScore - aScore;
    })[0];

    const primaryHex = primary.hex;
    const secondaryHex = secondary.hex;
    const accentHex = accent.hex;
    const lightHex = lightCandidate.hex;
    const darkHex = darkCandidate.hex;
    const initialBg = mixRgbColors(lightHex, "#ffffff", lightCandidate.lightness > 0.72 ? 0.32 : 0.68);
    const bgTintSource = colorfulRankedColors.find(color =>
      color.lightness >= 0.18 && color.lightness <= 0.78 && color.saturation >= 0.24
    ) || primary || accent;
    const bg = avoidSolidWhitePageBackground(initialBg, (bgTintSource && bgTintSource.hex) || accentHex || primaryHex);
    const panel = mixRgbColors(lightHex, "#ffffff", lightCandidate.lightness > 0.72 ? 0.72 : 0.86);
    const panelRgb = htmlHexToRgb(panel);
    const panelIsLight = relativeLuminanceFromRgb(panelRgb.red, panelRgb.green, panelRgb.blue) > 0.58;
    const ink = panelIsLight
      ? mixRgbColors(darkHex, "#000000", 0.28)
      : "#ffffff";
    const muted = panelIsLight
      ? mixRgbColors(ink, panel, 0.42)
      : mixRgbColors(ink, panel, 0.35);
    const gradientStartColor = colorfulRankedColors[0] || primary;
    const gradientEndColor = colorfulRankedColors.find(color =>
      color.hex !== gradientStartColor.hex &&
      (hueDistance(color.hue, gradientStartColor.hue) >= 12 || colorDistance(color, gradientStartColor) >= 48)
    ) || secondary;
    const heroBegin = gradientStartColor.hex;
    const heroEnd = gradientEndColor.hex;
    const heroTextColor = headerTextColorForGradient(heroBegin, heroEnd);
    const line = mixRgbColors(primaryHex, panel, 0.58);
    const shadowColor = mixRgbColors(primaryHex, "#000000", 0.38);

    return normalizeCustomTheme({
      ...getCurrentThemeFromOpenThemeBuilderDialog(),
      name: "Image-Generated Theme",
      font: DEFAULT_CUSTOM_THEME.font,
      bg,
      panel,
      ink,
      muted,
      primary: primaryHex,
      secondary: secondaryHex,
      accent: accentHex,
      line,
      heroBegin,
      heroEnd,
      hero: `linear-gradient(135deg,${heroBegin},${heroEnd})`,
      shadowColor,
      shadow: `0 12px 28px ${hexToRgba(shadowColor, .16)}`,
      includeHeaderOrnaments: true,
      includeHeaderGraphics: true,
      includeBuiltInAdvancedCss: true,
      advancedCss: imageGeneratedHeaderTextCss(heroTextColor)
    });
  }

  function applyAutoGeneratedThemeFromImage(image, file) {
    const theme = analyzeImagePalette(image);
    if (!theme) {
      setThemeBuilderColorSamplerStatus("The image could not be analyzed for theme colors.", true);
      return;
    }

    const baseName = String((file && file.name) || "").replace(/\.[^.]+$/, "").trim();
    theme.name = "Image-Generated Theme";
    applyThemeValuesInOpenThemeBuilderDialog(theme);
    setThemeBuilderColorSamplerStatus("Generated a custom theme from this image. Click the image to copy that pixel color as #RRGGBB.");
    setStatus("Generated an image-based custom theme.");
  }

  function setThemeBuilderSamplerHeightForLoadedImage() {
    const wrap = document.querySelector(".theme-builder-color-sampler-canvas-wrap");
    const canvas = document.getElementById("theme-builder-color-sampler-canvas");
    if (!wrap || !canvas) return;

    const viewportMax = 480;
    const minHeight = 220;
    const canvasRect = canvas.getBoundingClientRect();
    const desiredHeight = Math.ceil(canvasRect.height || canvas.height || minHeight);
    const fittedHeight = Math.max(minHeight, Math.min(viewportMax, desiredHeight));

    wrap.style.height = fittedHeight + "px";
  }

  function loadImageFileIntoThemeBuilderSampler(file, options = {}) {
    const panel = document.getElementById("theme-builder-color-sampler-panel");
    const canvas = document.getElementById("theme-builder-color-sampler-canvas");
    if (!panel || !canvas || !file) return;

    if (!/^image\/(png|jpeg)$/i.test(file.type) && !/\.(png|jpe?g)$/i.test(file.name || "")) {
      setThemeBuilderColorSamplerStatus("Please choose a PNG or JPEG image.", true);
      panel.hidden = false;
      return;
    }

    setThemeBuilderSamplerFilename(file);

    const context = canvas.getContext("2d", { willReadFrequently: true });
    const reader = new FileReader();

    reader.addEventListener("load", () => {
      const image = new Image();

      image.addEventListener("load", () => {
        const naturalWidth = Math.max(1, image.naturalWidth || image.width || 1);
        const naturalHeight = Math.max(1, image.naturalHeight || image.height || 1);
        const maxSamplerSize = 1400;
        const scale = Math.min(1, maxSamplerSize / Math.max(naturalWidth, naturalHeight));
        const width = Math.max(1, Math.round(naturalWidth * scale));
        const height = Math.max(1, Math.round(naturalHeight * scale));

        canvas.width = width;
        canvas.height = height;
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        context.clearRect(0, 0, width, height);
        context.drawImage(image, 0, 0, width, height);
        panel.hidden = false;
        requestAnimationFrame(setThemeBuilderSamplerHeightForLoadedImage);
        setThemeBuilderSampledColor("#------");

        if (options.autoGenerate) {
          applyAutoGeneratedThemeFromImage(image, file);
        } else {
          setThemeBuilderColorSamplerStatus("Click the image to copy that pixel color as #RRGGBB.");
        }
      });

      image.addEventListener("error", () => {
        panel.hidden = false;
        setThemeBuilderColorSamplerStatus("The selected image could not be loaded.", true);
      });

      image.src = String(reader.result || "");
    });

    reader.addEventListener("error", () => {
      panel.hidden = false;
      setThemeBuilderColorSamplerStatus("The selected image could not be read.", true);
    });

    reader.readAsDataURL(file);
  }

  async function copyTextToClipboard(text) {
    const value = String(text || "");

    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(value);
      return true;
    }

    const textarea = document.createElement("textarea");
    textarea.value = value;
    textarea.setAttribute("readonly", "readonly");
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    let copied = false;
    try {
      copied = document.execCommand("copy");
    } finally {
      textarea.remove();
    }

    return copied;
  }

  function setThemeBuilderColorSamplerStatus(message, error = false) {
    const statusElement = document.getElementById("theme-builder-color-sampler-status");
    if (!statusElement) return;
    statusElement.textContent = message;
    statusElement.style.color = error ? "#9d1c1c" : "#675454";
  }

  function setThemeBuilderSampledColor(hex) {
    const valueElement = document.getElementById("theme-builder-color-sampler-value");
    const swatch = document.getElementById("theme-builder-color-sampler-swatch");
    if (valueElement) valueElement.textContent = hex;
    if (swatch) swatch.style.backgroundColor = hex;
  }

  function setThemeBuilderSamplerFilename(file) {
    const filenameElement = document.getElementById("theme-builder-color-sampler-filename");
    if (!filenameElement) return;

    const filename = String((file && file.name) || "").trim();
    filenameElement.textContent = filename ? filename : "";
    filenameElement.title = filename;
  }

  function initializeThemeBuilderColorSampler() {
    const action = document.getElementById("theme-builder-color-sampler-action");
    const fileInput = document.getElementById("theme-builder-color-sampler-file");
    const autoGenerateAction = document.getElementById("theme-builder-auto-generate-action");
    const autoGenerateFileInput = document.getElementById("theme-builder-auto-generate-file");
    const panel = document.getElementById("theme-builder-color-sampler-panel");
    const canvas = document.getElementById("theme-builder-color-sampler-canvas");
    const hideAction = document.getElementById("theme-builder-color-sampler-hide-action");

    if (!action || !fileInput || !autoGenerateAction || !autoGenerateFileInput || !panel || !canvas || !hideAction) return;
    if (action.dataset.initialized === "true") return;

    const context = canvas.getContext("2d", { willReadFrequently: true });

    action.addEventListener("click", () => {
      fileInput.value = "";
      fileInput.click();
    });

    autoGenerateAction.addEventListener("click", () => {
      autoGenerateFileInput.value = "";
      autoGenerateFileInput.click();
    });

    hideAction.addEventListener("click", () => {
      panel.hidden = true;
      fileInput.value = "";
      autoGenerateFileInput.value = "";
      setThemeBuilderSamplerFilename(null);
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      loadImageFileIntoThemeBuilderSampler(file, { autoGenerate: false });
    });

    autoGenerateFileInput.addEventListener("change", () => {
      const file = autoGenerateFileInput.files && autoGenerateFileInput.files[0];
      if (!file) return;
      loadImageFileIntoThemeBuilderSampler(file, { autoGenerate: true });
    });

    canvas.addEventListener("click", async event => {
      if (!canvas.width || !canvas.height) return;

      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const x = Math.max(0, Math.min(canvas.width - 1, Math.floor((event.clientX - rect.left) * canvas.width / rect.width)));
      const y = Math.max(0, Math.min(canvas.height - 1, Math.floor((event.clientY - rect.top) * canvas.height / rect.height)));
      const pixel = context.getImageData(x, y, 1, 1).data;
      const hex = rgbToHtmlHex(pixel[0], pixel[1], pixel[2]);

      setThemeBuilderSampledColor(hex);

      try {
        const copied = await copyTextToClipboard(hex);
        setThemeBuilderColorSamplerStatus(copied ? `Copied ${hex} to the clipboard.` : `Selected ${hex}. Copy it manually if needed.`, !copied);
      } catch (error) {
        console.warn("Unable to copy sampled image color.", error);
        setThemeBuilderColorSamplerStatus(`Selected ${hex}. Clipboard copy was blocked; copy it manually.`, true);
      }
    });

    action.dataset.initialized = "true";
  }

  function initializeThemeBuilderActions() {
    const saveButton = document.getElementById("theme-builder-save-action");
    if (saveButton && saveButton.dataset.initialized !== "true") {
      saveButton.addEventListener("click", saveCustomThemeFromBuilder);
      saveButton.dataset.initialized = "true";
    }

    const loadButton = document.getElementById("theme-builder-load-action");
    if (loadButton && loadButton.dataset.initialized !== "true") {
      loadButton.addEventListener("click", loadCustomThemeIntoBuilder);
      loadButton.dataset.initialized = "true";
    }

    const loadBuiltInButton = document.getElementById("theme-builder-load-built-in-action");
    if (loadBuiltInButton && loadBuiltInButton.dataset.initialized !== "true") {
      loadBuiltInButton.addEventListener("click", loadBuiltInThemeIntoBuilder);
      loadBuiltInButton.dataset.initialized = "true";
    }

    const fullPreviewButton = document.getElementById("theme-builder-full-preview-action");
    if (fullPreviewButton && fullPreviewButton.dataset.initialized !== "true") {
      fullPreviewButton.addEventListener("click", openFullThemePreview);
      fullPreviewButton.dataset.initialized = "true";
    }

    initializeThemeBuilderColorSampler();
  }

  function scheduleThemeBuilderActions() {
    let attempts = 0;

    const apply = () => {
      attempts += 1;
      initializeThemeBuilderActions();
      const layoutReady = initializeThemeBuilderLayout();

      const ready = document.getElementById("theme-builder-save-action") &&
        document.getElementById("theme-builder-load-action") &&
        document.getElementById("theme-builder-load-built-in-action") &&
        document.getElementById("theme-builder-full-preview-action") &&
        document.getElementById("theme-builder-auto-generate-action") &&
        document.getElementById("theme-builder-color-sampler-action") && layoutReady;

      if (!ready && attempts < 40) {
        setTimeout(apply, 25);
      }
    };

    requestAnimationFrame(() => requestAnimationFrame(apply));
  }

  async function loadBuiltInThemeIntoBuilder() {
    const selector = document.getElementById("theme-builder-built-in-theme");
    const themeId = selector ? selector.value : "";
    if (!themeId || themeId === "custom") return;

    const themeName = optionName(THEME_OPTIONS, themeId);
    const confirmation = await DayPilot.Modal.confirm(
      `Load ${escapeHtml(themeName)} as the starting point for this custom theme?<br><br>` +
      "This will replace the current working custom theme settings in the Theme Builder.",
      {
        title: "Load Built-In Theme",
        okText: "Load\u00a0Theme",
        cancelText: "Cancel",
        top: 150
      }
    );

    if (confirmation.canceled) return;

    const sourceTheme = normalizeCustomTheme({
      ...themeCss(themeId),
      name: themeName
    });

    applyThemeValuesInOpenThemeBuilderDialog(sourceTheme);
    setStatus(`Loaded ${themeName} values into the Theme Builder. Edit the loaded values or save a theme file when ready.`);
  }

  async function openThemeBuilder() {
    const initialTheme = normalizeCustomTheme(state.customTheme || DEFAULT_CUSTOM_THEME);
    latestThemeBuilderTheme = initialTheme;

    const textFieldHtml = (label, fieldId, extraClass = "") =>

  function selectSettingsFile() {
    return new Promise(resolve => {
      const input = document.createElement("input");
      input.type = "file";
      input.multiple = false;

      if (!isIOSDevice()) {
        input.setAttribute("accept", ".txt,.json,text/plain,application/json");
      }

      input.addEventListener("change", () => {
        resolve(input.files && input.files.length ? input.files[0] : null);
        input.remove();
      }, { once: true });

      document.body.appendChild(input);
      input.click();
    });
  }
